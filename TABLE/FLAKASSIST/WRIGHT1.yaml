template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC13121720_44319_2026_733_MOESM3_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13121720.1/44319_2026_733_MOESM3_ESM.xlsx
    sheet: Dataset EV1 - Input Information
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: C
      explode_by: ","
      prefix: "NCBIGene:"
      prioritize:
        - Gene
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: column
      encoding: A
      regex:
        - pattern: _
          replacement: ":"
      prioritize:
        - Disease
        - PhenotypicFeature
  provenance:
    repo: PMC
    publication: PMC13121720
    contributors:
      - kind: curation
        name: tablassist
        date: 12 MAY 2026
  annotations:
    - annotation: mapped trait
      method: column
      encoding: B
    - annotation: gene count
      method: column
      encoding: D
    - annotation: variant type
      method: column
      encoding: E
    - annotation: trait type
      method: column
      encoding: F
    - annotation: biological domain
      method: column
      encoding: G
    - annotation: study identifier
      method: column
      encoding: H
    - annotation: pubmed id
      method: column
      encoding: I
    - annotation: reported trait
      method: column
      encoding: J
    - annotation: population sample size
      method: column
      encoding: K
    - annotation: population cohort
      method: column
      encoding: L
    - annotation: analysis set
      method: column
      encoding: M
    - annotation: trait cosine similarity
      method: column
      encoding: N
    - annotation: synintol
      method: column
      encoding: O
    - annotation: loeuf
      method: column
      encoding: P
    - annotation: length
      method: column
      encoding: Q
    - annotation: ngo
      method: column
      encoding: R
    - annotation: shet
      method: column
      encoding: S
    - annotation: mrna
      method: column
      encoding: T
    - annotation: n mrna
      method: column
      encoding: U
    - annotation: cds
      method: column
      encoding: V
    - annotation: explof
      method: column
      encoding: W
    - annotation: phylop
      method: column
      encoding: X
