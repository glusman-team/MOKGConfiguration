template:
  source:
    kind: excel
    local: ./DATALAKE/PMC13060440_media-3.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13060440.1/media-3.xlsx
    sheet: ST2
    row_slice: [2, auto]
  provenance:
    repo: PMC
    publication: PMC13060440
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 15 MAY 2026
      - kind: tool
        name: tablassist
        date: 15 MAY 2026

sections:
  - statement:
      subject:
        method: column
        encoding: A
        prefix: "RS:"
      predicate: related_to
      object:
        method: value
        encoding: insulin resistance
      qualifiers:
        - qualifier: context_qualifier
          method: column
          encoding: H
    annotations:
      - annotation: chromosome
        method: column
        encoding: B
      - annotation: genomic_position
        method: column
        encoding: C
      - annotation: minor_allele_frequency
        method: column
        encoding: D
      - annotation: effect_allele
        method: column
        encoding: E
      - annotation: other_allele
        method: column
        encoding: F
      - annotation: novel_or_reported
        method: column
        encoding: G
      - annotation: bmi_subgroup
        method: column
        encoding: H
      - annotation: vep_annotation
        method: column
        encoding: I
      - annotation: gsem_beta
        method: column
        encoding: J
      - annotation: gsem_p_value
        method: column
        encoding: K
      - annotation: gsem_q
        method: column
        encoding: L
      - annotation: coloc_posterior_probability
        method: column
        encoding: AI
