template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12446642_mmc1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12446642/
    sheet: Table S3. Cox
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: incident DKD during follow-up
      prioritize:
        - Disease
  annotations:
    - annotation: full name
      method: column
      encoding: B
    - annotation: coef
      method: column
      encoding: C
    - annotation: sd coef
      method: column
      encoding: D
    - annotation: hazard ratio
      method: column
      encoding: E
    - annotation: HR p-value
      method: column
      encoding: F
    - annotation: FDR
      method: column
      encoding: G
    - annotation: Bonferroni p-value
      method: column
      encoding: H
  provenance:
    repo: PMC
    publication: PMC12446642
    contributors:
      - kind: curation
        name: tablassist
        date: 12 MAY 2026
