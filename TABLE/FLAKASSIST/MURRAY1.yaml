template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC10705403_media-3.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC10705403.1/media-3.xlsx
    sheet: Sheet1
    row_slice:
      - 1
      - auto
  statement:
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0007309
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
  provenance:
    repo: PMC
    publication: PMC10705403
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026
  annotations:
    - annotation: pathway context
      method: value
      encoding: Cholesterol biosynthesis (Reactome)
    - annotation: miscellaneous notes
      method: value
      encoding:
        "Leading-edge analysis performed on all significant Reactome pathways
        with 'cholesterol' in the title (FWER < 0.05). Genes from GSEA of RNA-seq
        data in sciatic nerves of three CMT1A mouse models: C3-PMP22, Sipa1l2-KO, and
        C3-PMP22::Sipa1l2 double mutant vs wild-type."
sections:
  - statement:
      subject:
        method: column
        encoding: B
        prioritize:
          - Gene
        taxon: 10090
    annotations:
      - annotation: model
        method: value
        encoding: C3-PMP22 (CMT1A model)
  - statement:
      subject:
        method: column
        encoding: C
        prioritize:
          - Gene
        taxon: 10090
    annotations:
      - annotation: model
        method: value
        encoding: Sipa1l2-KO
  - statement:
      subject:
        method: column
        encoding: D
        prioritize:
          - Gene
        taxon: 10090
    annotations:
      - annotation: model
        method: value
        encoding: C3-PMP22::Sipa1l2 (double mutant)
