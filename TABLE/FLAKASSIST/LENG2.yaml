template:
  syntax: TC3
  status: alpha
  source:
    kind: text
    local: ./DATALAKE/PMC12184055_mmc1.csv
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12184055/
    delimiter: ","
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Protein
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: MONDO:0004975
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  annotations:
    - annotation: hazard ratio
      method: column
      encoding: B
    - annotation: upper confidence interval
      method: column
      encoding: C
    - annotation: lower confidence interval
      method: column
      encoding: D
    - annotation: p value
      method: column
      encoding: E
    - annotation: fdr corrected p value
      method: column
      encoding: F
  provenance:
    repo: PMC
    publication: PMC12184055
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
