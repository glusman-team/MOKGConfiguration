      prioritize:
      - Gene
  provenance:
    repo: PMC
    publication: PMC12906803
    contributors:
    - kind: curation
      name: Skye Lane Goetz
      comment: GO enrichment - sst1-1 control vs WT (nuclear genome)
      date: 14 MAY 2026
    - kind: tool
      name: tablassist
      date: 14 MAY 2026
  annotations:
  - annotation: go_description
    method: column
    encoding: B
  - annotation: gene_count
    method: column
    encoding: C
  - annotation: total_genes
    method: column
    encoding: D
  - annotation: p_value
    method: column
    encoding: E
  - annotation: p_adjusted
    method: column
    encoding: F
