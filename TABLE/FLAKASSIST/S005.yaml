template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./source/PMC12906803.1/PBI-24-831-s005.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC12906803.1/PBI-24-831-s005.xlsx
    row_slice:
      - 1
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - BiologicalProcess
        - MolecularActivity
        - CellularComponent
    predicate: related_to
    object:
      method: column
      encoding: G
      taxon: 3847
      prioritize:
        - Gene
      explode_by: ";"

  provenance:
    repo: PMC
    publication: "PMC12906803"
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 14 MAY 2026
      - kind: tool
        name: tablassist
        date: 14 MAY 2026

  annotations:
    - annotation: go description
      method: column
      encoding: B
    - annotation: gene count
      method: column
      encoding: C
    - annotation: total genes
      method: column
      encoding: D
    - annotation: p value
      method: column
      encoding: E
    - annotation: p adjusted
      method: column
      encoding: F
