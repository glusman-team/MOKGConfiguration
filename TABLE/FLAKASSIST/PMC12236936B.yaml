template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12236936_media-2.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12236936/
    sheet: SuppData4
    row_slice:
    - 1
    - auto
  statement:
    subject:
      method: column
      encoding: C
      prioritize:
      - Pathway
    predicate: associated_with
    object:
      method: column
      encoding: O
      prioritize:
      - Disease
    qualifiers:
    - qualifier: species_context_qualifier
      method: value
      encoding: NCBITaxon:9606
  annotations:
  - annotation: category
    method: column
    encoding: A
  - annotation: subcategory
    method: column
    encoding: B
  - annotation: description
    method: column
    encoding: D
  - annotation: gene ratio
    method: column
    encoding: E
  - annotation: background ratio
    method: column
    encoding: F
  - annotation: rich factor
    method: column
    encoding: G
  - annotation: fold enrichment
    method: column
    encoding: H
  - annotation: z score
    method: column
    encoding: I
  - annotation: p value
    method: column
    encoding: J
  - annotation: adjusted p value
    method: column
    encoding: K
  - annotation: q value
    method: column
    encoding: L
  - annotation: gene id list
    method: column
    encoding: M
  - annotation: count
    method: column
    encoding: N
  - annotation: cluster
    method: column
    encoding: P
  - annotation: regulation
    method: column
    encoding: Q
  provenance:
    repo: PMC
    publication: PMC12236936
    contributors:
    - kind: curation
      name: OpenCode
      date: 13 MAY 2026
    - kind: tool
      name: tablassist
      date: 13 MAY 2026
