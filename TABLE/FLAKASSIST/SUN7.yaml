template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC13168532_FSN3-14-e71814-s009.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13168532.1/FSN3-14-e71814-s009.xlsx
    row_slice:
      - 2
      - auto
    sheet: kegg
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - MolecularActivity
        - BiologicalProcess
        - Pathway
      remove:
        - '*.\'
    predicate: related_to
    object:
      method: column
      encoding: F
      explode_by: ","
      prioritize:
        - Gene
      taxon: 9606
  annotations:
    - annotation: count
      method: column
      encoding: C
    - annotation: percentage
      method: column
      encoding: D
    - annotation: p value
      method: column
      encoding: E
    - annotation: list total
      method: column
      encoding: G
    - annotation: pop hits
      method: column
      encoding: H
    - annotation: pop total
      method: column
      encoding: I
    - annotation: fold enrichment
      method: column
      encoding: J
    - annotation: bonferroni
      method: column
      encoding: K
    - annotation: benjamini
      method: column
      encoding: L
    - annotation: fdr
      method: column
      encoding: M
  provenance:
    repo: PMC
    publication: PMC13168532
    contributors:
      - kind: tool
        name: tablassist
        date: 15 MAY 2026
