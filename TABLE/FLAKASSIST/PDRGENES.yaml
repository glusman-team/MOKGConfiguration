    method: column
    encoding: F
  - annotation: pdr rank
    method: column
    encoding: G
  - annotation: pdr rank gene only
    method: column
    encoding: H
  - annotation: phenolizer rank
    method: column
    encoding: I
  - annotation: filter cascade gene count
    method: column
    encoding: J
  - annotation: acmg classification
    method: column
    encoding: K
  - annotation: zygosity
    method: column
    encoding: L
  - annotation: predicted functional effect
