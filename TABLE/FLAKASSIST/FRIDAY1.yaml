template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12187248_NIHMS2090365-supplement-3.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12187248/
    sheet: 2. LD Proteome
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: C
      taxon: 10090
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: APOE4-related lipid droplet proteome
  annotations:
    - annotation: accession
      method: column
      encoding: A
    - annotation: description
      method: column
      encoding: B
    - annotation: entrez gene id
      method: column
      encoding: D
    - annotation: coverage [%]
      method: column
      encoding: E
    - annotation: peptides
      method: column
      encoding: F
    - annotation: psms
      method: column
      encoding: G
    - annotation: unique peptides
      method: column
      encoding: H
    - annotation: aas
      method: column
      encoding: I
    - annotation: mw [kDa]
      method: column
      encoding: J
    - annotation: calc. pI
      method: column
      encoding: K
    - annotation: score sequest ht
      method: column
      encoding: L
  provenance:
    repo: PMC
    publication: PMC12187248
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026
