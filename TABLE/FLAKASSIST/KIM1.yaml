    publication: PMC13083238
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026
  annotations:
    - annotation: beta
      method: column
      encoding: I
    - annotation: log10 p-value
      method: column
      encoding: L
    - annotation: annotation
      method: column
      encoding: AE
    - annotation: novel
      method: column
      encoding: AH
