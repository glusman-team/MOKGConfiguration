template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC13161869_ACN3-13-911-s001.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13161869.1/ACN3-13-911-s001.xlsx
    sheet: Cap Score - Ion Level
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      remove:
        - _HUMAN
      prioritize:
        - Gene
      taxon: 9606
    predicate: biomarker_for
    object:
      method: value
      encoding: Huntington disease
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC13161869
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: adjusted_p_value
      method: column
      encoding: H
    - annotation: miscellaneous notes
      method: value
      encoding: CSF proteomics biomarkers from PREDICT-HD cohort, Analysis 1 FDR
