template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC11790612_Table1.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11790612/
    sheet: Table S2
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: E
      taxon: 9606
      prioritize:
        - Gene
    predicate: gene_associated_with_condition
    object:
      method: column
      encoding: D
      fill: forward
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC11790612
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: zygosity
      method: column
      encoding: G
    - annotation: inheritance
      method: column
      encoding: H
    - annotation: variant type
      method: column
      encoding: I
    - annotation: ACMG classification
      method: column
      encoding: K
    - annotation: miscellaneous notes
      method: value
      encoding: P/LP SNVs in 82 pediatric epilepsy patients (Han Chinese cohort)
