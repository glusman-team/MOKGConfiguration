template:
  source:
    kind: excel
    local: ./DATALAKE/PMC13083259_41588_2026_2549_MOESM4_ESM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC13083259/
    sheet: Table S5
    row_slice:
    - 1
    - auto
  provenance:
    repo: PMC
    publication: PMC13083259
    contributors:
    - kind: curation
      name: Skye Lane Goetz
      date: 15 MAY 2026
    - kind: tool
      name: tablassist
      date: 15 MAY 2026
sections:
- statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
      - Gene
    predicate: related_to
    object:
      method: column
      encoding: A
      regex:
      - pattern: ^HDL$
        replacement: high-density lipoprotein level
      - pattern: ^CD$
        replacement: Crohn's disease
      - pattern: ^SCZ$
        replacement: schizophrenia
      - pattern: ^Height$
        replacement: body height
  annotations:
  - annotation: snp_id
    method: column
    encoding: C
    prefix: 'RS:'
  - annotation: posterior_inclusion_probability
    method: column
    encoding: D
  - annotation: variant_annotation
    method: column
    encoding: E
  - annotation: literature_reference
    method: column
    encoding: F
  - annotation: miscellaneous_notes
    method: column
    encoding: G
