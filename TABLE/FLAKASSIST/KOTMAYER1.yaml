template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12264048_41408_2025_1309_MOESM8_ESM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/12264048/bin/41408_2025_1309_MOESM8_ESM.xlsx
    row_slice:
      - 1
      - auto
    reindex:
      - column: D
        comparison: ne
        comparator: NA
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - Gene
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: myelodysplastic syndrome
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC12264048
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: variant allele frequency
      method: column
      encoding: G
    - annotation: mutation type
      method: column
      encoding: F
    - annotation: cosmic identifier
      method: column
      encoding: I
      remove:
        - ^\s*-\s*$
