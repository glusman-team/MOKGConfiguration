      method: value
      encoding: MONDO:0019019
      prioritize:
      - Disease
  provenance:
    repo: PMC
    publication: PMC13167090
    contributors:
    - kind: curation
      name: Tablassist
      date: 13 MAY 2026
    - kind: tool
      name: tablassist
      date: 13 MAY 2026
