template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13128347_ALZ-22-e71292-s004.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC13128347/
    sheet: S_Table3
    row_slice: [1, auto]
    reindex:
      - column: G
        comparison: lt
        comparator: 0.05

  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: "Alzheimer disease"
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: PMC13128347
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026

  annotations:
    - annotation: log fold change
      method: column
      encoding: C
    - annotation: p value
      method: column
      encoding: F
    - annotation: adjusted p value
      method: column
      encoding: G
    - annotation: miscellaneous notes
      method: value
      encoding: "Differentially expressed genes between Alzheimer's disease subtypes from MayoRNAseq dataset"
