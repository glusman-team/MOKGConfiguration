template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13079829_41467_2026_69405_MOESM5_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13079829.1/41467_2026_69405_MOESM5_ESM.xlsx
    sheet: "Fig. 6b"
    row_slice: [2, auto]

  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - ChemicalEntity
        - SmallMolecule
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize:
        - Disease

  provenance:
    repo: PMC
    publication: PMC13079829
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 13 MAY 2026
      - kind: tool
        name: tablassist
        date: 13 MAY 2026

  annotations:
    - annotation: p value
      method: column
      encoding: F
    - annotation: fdr
      method: column
      encoding: I
    - annotation: effect size
      method: column
      encoding: C
    - annotation: miscellaneous notes
      method: value
      encoding: "Prospective cohort (CLSA, n=8,669). Metabolites measured at baseline; disease incidence during follow-up period FU1. Estimate is regression coefficient."
