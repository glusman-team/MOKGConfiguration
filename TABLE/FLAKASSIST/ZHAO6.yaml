    encoding: B
  - annotation: standard error
    method: column
    encoding: C
  - annotation: p value
    method: column
    encoding: D
  - annotation: model_r2
    method: column
    encoding: E
  - annotation: n_snps
    method: column
    encoding: F
  - annotation: fdr_corrected_p_value
    method: column
    encoding: G
