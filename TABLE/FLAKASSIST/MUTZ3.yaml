      method: column
      encoding: A
      prioritize:
        - SmallMolecule
        - ChemicalEntity
    predicate: associated_with_increased_likelihood_of
    object:
      method: value
      encoding: Dementia in other diseases
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC13169133
    contributors:
      - kind: tool
        name: tablassist
        date: 14 MAY 2026
  annotations:
    - annotation: metabolite group
      method: column
      encoding: B
    - annotation: metabolite subgroup
      method: column
      encoding: C
    - annotation: hazard ratio
      method: column
      encoding: D
    - annotation: confidence interval lower bound
      method: column
      encoding: E
    - annotation: confidence interval upper bound
      method: column
      encoding: F
    - annotation: p value
      method: column
      encoding: G
    - annotation: nominal significance
      method: column
      encoding: H
    - annotation: bonferroni significance
      method: column
      encoding: I
    - annotation: transformed p value
      method: column
      encoding: J
    - annotation: mean importance
      method: column
      encoding: K
