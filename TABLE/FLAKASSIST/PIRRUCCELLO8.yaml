      encoding: D
    - annotation: twas z score
      method: column
      encoding: E
    - annotation: twas p value
      method: column
      encoding: F
    - annotation: colocalization pp0
      method: column
      encoding: G
    - annotation: colocalization pp1
      method: column
      encoding: H
    - annotation: colocalization pp2
      method: column
      encoding: I
    - annotation: colocalization pp3
      method: column
      encoding: J
    - annotation: colocalization pp4
      method: column
      encoding: K
    - annotation: hsq
      method: column
      encoding: L
    - annotation: eqtl id
      method: column
      encoding: N
    - annotation: eqtl r squared
      method: column
      encoding: O
    - annotation: eqtl z score
      method: column
      encoding: P
    - annotation: number of snps
      method: column
      encoding: Q
    - annotation: number of weights
      method: column
      encoding: R
    - annotation: model
      method: column
      encoding: S
    - annotation: model cv r squared
      method: column
      encoding: T
    - annotation: model cv p value
      method: column
      encoding: U
  provenance:
