template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC7206184_41467_2020_15823_MOESM9_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC7206184.1/41467_2020_15823_MOESM9_ESM.xlsx
    sheet: v68.lvesvi.twas.alltissues
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
        - Protein
    predicate: related_to
    object:
      method: column
      encoding: C
      prioritize:
        - SequenceVariant
        - Snv
