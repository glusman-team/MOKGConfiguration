    encoding: B
  - annotation: AveExpr
    method: column
    encoding: C
  - annotation: t
    method: column
    encoding: D
  - annotation: P.Value
    method: column
    encoding: E
  - annotation: adj.P.Val
    method: column
    encoding: F
