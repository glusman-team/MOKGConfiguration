template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12966700_mmc1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12966700/
    sheet: Table S1
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - SequenceVariant
    predicate: is_sequence_variant_of
    object:
      method: column
      encoding: A
      regex:
        - pattern: " .*"
          replacement: ""
      prioritize:
        - Gene
      taxon: 9606
  provenance:
    repo: PMC
    publication: PMC12966700
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026
  annotations:
    - annotation: alteration type
      method: column
      encoding: B
    - annotation: classification
      method: column
      encoding: L
    - annotation: spliceAI max
      method: column
      encoding: C
    - annotation: gtex blood tpm
      method: column
      encoding: E
    - annotation: meets all criteria
      method: column
      encoding: K
