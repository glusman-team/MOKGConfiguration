template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC11554838_41416_2024_2875_MOESM6_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC11554838.1/41416_2024_2875_MOESM6_ESM.xlsx
    sheet: Sheet1
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - Gene
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: triple-negative breast carcinoma
      prioritize:
        - Disease
    qualifiers:
      - qualifier: subject_form_or_variant_qualifier
        method: value
        encoding: somatic
  provenance:
    repo: PMC
    publication: PMC11554838
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: variant_class
      method: column
      encoding: C
    - annotation: oncogenicity_classification
      method: column
      encoding: F
    - annotation: miscellaneous notes
      method: value
      encoding:
        Somatic variants from MAS98.12 PDX model (paclitaxel-sensitive). Most
        classified as VUS.
