template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC7206184_41467_2020_15823_MOESM8_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC7206184.1/41467_2020_15823_MOESM8_ESM.xlsx
    sheet: Replication
    row_slice:
    - 1
    - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
      - SequenceVariant
      - Snv
    predicate: related_to
    object:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
      - Gene
      - Protein
    qualifiers:
    - qualifier: object_form_or_variant_qualifier
      method: value
      encoding: replication
    - qualifier: object_aspect_qualifier
      method: column
      encoding: C
  annotations:
  - annotation: chromosome
    method: column
    encoding: D
  - annotation: genomic position hg19
    method: column
    encoding: E
  - annotation: effect allele
    method: column
    encoding: F
  - annotation: other allele
    method: column
    encoding: G
  - annotation: effect allele frequency
    method: column
    encoding: H
  - annotation: ukbb beta
    method: column
    encoding: I
  - annotation: ukbb p value
    method: column
    encoding: J
  - annotation: mesa sign
    method: column
    encoding: K
  - annotation: mesa p value
    method: column
    encoding: L
  - annotation: biobank japan sign
    method: column
    encoding: M
  provenance:
    repo: PMC
    publication: PMC7206184
    contributors:
    - kind: curation
      name: Skye Lane Goetz
      date: 15 MAY 2026
    - kind: tool
      name: tablassist
      date: 15 MAY 2026
