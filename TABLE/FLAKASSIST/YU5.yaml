template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC5197061_thnov07p0238s5.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/5197061/bin/thnov07p0238s5.xlsx
    sheet: This study_UP+UC
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      regex:
        - pattern: ^([A-Z0-9]+(?:-[0-9]+)?)$
          replacement: UniProtKB:$1
      taxon: 9606
      prioritize:
        - Protein
    predicate: expressed_in
    object:
      method: value
      encoding: UBERON:0001088
      prioritize:
        - AnatomicalEntity
    qualifiers: []
  provenance:
    repo: PMC
    publication: PMC5197061
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: Entry name
      method: column
      encoding: B
    - annotation: Status
      method: column
      encoding: C
    - annotation: Protein names
      method: column
      encoding: D
    - annotation: Gene names
      method: column
      encoding: E
    - annotation: Organism
      method: column
      encoding: F
    - annotation: Length
      method: column
      encoding: G
