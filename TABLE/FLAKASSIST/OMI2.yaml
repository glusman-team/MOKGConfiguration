template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC11993224_mmc3.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC11993224.1/mmc3.xlsx
    sheet: Table S2
    row_slice:
    - 1
    - auto
  statement:
    subject:
      method: column
      encoding: F
      remove:
      - \s+$
      prioritize:
      - Gene
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0008642
      prioritize:
      - Disease
  provenance:
    repo: PMC
    publication: PMC11993224
    contributors:
    - kind: curation
      name: Tablassist Pipeline
      date: 13 MAY 2026
  annotations:
  - annotation: study id
    method: column
    encoding: A
  - annotation: transcript
    method: column
    encoding: G
  - annotation: nucleotide change
    method: column
    encoding: H
  - annotation: amino acid change
    method: column
    encoding: I
  - annotation: zygosity
    method: column
    encoding: J
  - annotation: variant type
    method: column
    encoding: K
  - annotation: inheritance
    method: column
    encoding: L
  - annotation: omim gene number
    method: column
    encoding: N
  - annotation: pli
    method: column
    encoding: O
  - annotation: z score
    method: column
    encoding: P
  - annotation: hgmd
    method: column
    encoding: Q
  - annotation: clinvar
    method: column
    encoding: R
  - annotation: gnomad
    method: column
    encoding: S
  - annotation: cadd
    method: column
    encoding: T
  - annotation: miscellaneous notes
    method: value
    encoding: VACTERL trio exome rare variant analysis; 328 variants across 101 unique
      genes
