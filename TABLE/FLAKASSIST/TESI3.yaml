template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC11129334_mmc1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC11129334/
    sheet: Supplementary_table_3
    row_slice:
      - 1
      - auto

  statement:
