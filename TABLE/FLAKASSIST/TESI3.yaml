      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: column
      encoding: I
      prioritize:
        - Disease

  provenance:
    repo: PMC
    publication: PMC11129334
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 12 MAY 2026
      - kind: tool
        name: tablassist
        date: 12 MAY 2026

  annotations:
    - annotation: ACMG classification
      method: column
      encoding: G
