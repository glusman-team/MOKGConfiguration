template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC13134200_13073_2026_1619_MOESM2_ESM.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC13134200.1/13073_2026_1619_MOESM2_ESM.xlsx
    sheet: Table S1
    row_slice:
    - 1
    - auto
    reindex:
    - column: G
      comparison: ne
      comparator: Gene Symbol
  statement:
    subject:
      method: column
      encoding: G
      prioritize:
      - Gene
      taxon: 9606
      remove:
      - Gene Symbol
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0005308
      prioritize:
      - Disease
    qualifiers:
    - qualifier: species_context_qualifier
      method: value
      encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC13134200
    contributors:
    - kind: curation
      name: Tablassist Pioneer
      date: 12 MAY 2026
    - kind: tool
      name: tablassist
      date: 12 MAY 2026
  annotations:
  - annotation: analysis method
    method: value
    encoding: COBT (Case-Only Burden Test)
  - annotation: consequence
    method: column
    encoding: H
  - annotation: pathogenicity flag
    method: column
    encoding: N
  - annotation: miscellaneous notes
    method: value
    encoding: 'COBT gene-based rare variant burden test applied to 478 ciliopathy
      patients. Table S1 shows 124 variant-level rows across 15 candidate genes from
      83 unsolved patients with manual phenotype compatibility assessment. Known ciliopathy
      genes re-identified include CCDC40, NPHP4, IFT140, WDR60. Note: contains mid-table
      header repeats that are filtered during extraction.'
