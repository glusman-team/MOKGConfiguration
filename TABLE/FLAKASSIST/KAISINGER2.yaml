template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC10435378_mmc19.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10435378/
    sheet: Sheet1
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: G
      taxon: 9606
      prioritize:
        - Gene
      explode_by: ","
    predicate: participates_in
    object:
      method: column
      encoding: A
      prioritize:
        - Pathway
        - BiologicalProcess
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC10435378
    contributors:
      - kind: tool
        name: tablassist
        date: 12 MAY 2026
  annotations:
    - annotation: term_description
      method: column
      encoding: B
    - annotation: term_size
      method: column
      encoding: C
    - annotation: observed_count
      method: column
      encoding: D
    - annotation: strength
      method: column
      encoding: E
    - annotation: fdr
      method: column
      encoding: F
    - annotation: miscellaneous notes
      method: value
      encoding:
        STRING pathway enrichment for BMI+SAC10 life-course-acting gene set
        from UK Biobank exome-wide association; FDR from STRING enrichment analysis.
