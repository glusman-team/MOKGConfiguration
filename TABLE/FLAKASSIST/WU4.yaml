template:
  source:
    kind: excel
    local: ./DATALAKE/PMC13083259_41588_2026_2549_MOESM4_ESM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC13083259/
    sheet: Table S4
    row_slice:
      - 1
      - auto
  provenance:
    repo: PMC
    publication: PMC13083259
    contributors:
      - kind: tool
        name: tablassist
        date: 15 MAY 2026
sections:
  - statement:
      subject:
        method: column
        encoding: B
        prefix: "RS:"
      predicate: related_to
      object:
        method: column
        encoding: P
        taxon: 9606
        prioritize:
          - Gene
        remove:
          - ^NA$
    annotations:
      - annotation: trait
        method: column
        encoding: A
        regex:
          - pattern: ^SCZ$
            replacement: schizophrenia
          - pattern: ^CD$
            replacement: Crohn's disease
      - annotation: chromosome
        method: column
        encoding: C
      - annotation: genomic_position
        method: column
        encoding: D
      - annotation: effect_allele
        method: column
        encoding: E
      - annotation: other_allele
        method: column
        encoding: F
      - annotation: allele_frequency
        method: column
        encoding: G
      - annotation: effect_size
        method: column
        encoding: H
      - annotation: standard_error
        method: column
        encoding: I
      - annotation: variance_explained
        method: column
        encoding: J
      - annotation: posterior_inclusion_probability
        method: column
        encoding: K
      - annotation: gelman_rubin_convergence
        method: column
        encoding: L
      - annotation: gwas_beta
        method: column
        encoding: M
      - annotation: gwas_standard_error
        method: column
        encoding: N
      - annotation: gwas_p_value
        method: column
        encoding: O
