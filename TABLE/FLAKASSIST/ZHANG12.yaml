template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12446642_mmc1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12446642/
    sheet: Table S10. KM
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: DKD progression validation
      prioritize:
        - Disease
  annotations:
    - annotation: cutoff result
      method: column
      encoding: B
    - annotation: coef
      method: column
      encoding: C
    - annotation: sd coef
      method: column
      encoding: D
    - annotation: hazard ratio
      method: column
      encoding: E
    - annotation: HR p-value
      method: column
      encoding: F
    - annotation: p-value bfi
      method: column
      encoding: G
    - annotation: hazard ratio confidence interval
      method: column
      encoding: H
  provenance:
    repo: PMC
    publication: PMC12446642
    contributors:
      - kind: curation
        name: tablassist
        date: 12 MAY 2026
