template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/PMC12168260_13020_2025_1135_MOESM2_ESM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/12168260/bin/13020_2025_1135_MOESM2_ESM.xlsx
    sheet: Sheet1
    row_slice:
      - 2
      - auto
  statement:
