    object:
      method: value
      encoding: MONDO:0005180
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
  provenance:
    repo: PMC
    publication: PMC12168260
    contributors:
      - kind: tool
        name: tablassist
        date: 13 MAY 2026
  annotations:
    - annotation: class_i
      method: column
      encoding: B
    - annotation: molecular_weight_da
      method: column
      encoding: C
    - annotation: formula
      method: column
      encoding: D
    - annotation: ionization_model
      method: column
      encoding: E
    - annotation: dzp_decoction_abundance
      method: column
      encoding: F
    - annotation: dzp1_abundance
      method: column
      encoding: G
    - annotation: dzp2_abundance
      method: column
      encoding: H
    - annotation: dzp3_abundance
      method: column
      encoding: I
    - annotation: pd1_abundance
      method: column
      encoding: J
    - annotation: pd2_abundance
      method: column
      encoding: K
    - annotation: pd3_abundance
      method: column
      encoding: L
