template:
  syntax: TC3
  status: beta
  source:
    kind: excel
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10349864/bin/42003_2023_5113_MOESM4_ESM.xlsx
    local: ./DATALAKE/DURAZO1.xlsx
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
    predicate: correlated_with
    object:
      method: column
      encoding: H
      prioritize:
        - Disease
      remove:
        - _.*$
      regex:
        - pattern: ^CD$
          replacement: Crohn disease
        - pattern: ^UC$
          replacement: ulcerative colitis
        - pattern: ^PD$
          replacement: Parkinson disease
        - pattern: ^SCZ$
          replacement: schizophrenia
        - pattern: ^MS$
          replacement: multiple sclerosis
        - pattern: ^AD$
          replacement: Alzheimer disease
        - pattern: ^LBD$
          replacement: Lewy body dementia
        - pattern: ^ALS$
          replacement: amyotrophic lateral sclerosis
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: object_context_qualifier
        method: value
        encoding: UMLS:C2350277
  provenance:
    repo: PMC
    publication: PMC10349864
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 28 APR 2026
        organizations:
          - Institute for Systems Biology
        comment: Migrated from legacy durazo1.yaml while preserving original curator metadata.
  annotations:
    - annotation: sample size
      method: value
      encoding: 982
    - annotation: p value
      method: column
      encoding: P
    - annotation: relationship strength
      method: column
      encoding: J
    - annotation: assertion method
      method: value
      encoding: regional genetic correlation
    - annotation: multiple testing correction method
      method: value
      encoding: false discovery rate (FDR)

sections:
  - source:
      sheet: Supplementary_Data_2
    statement:
      subject:
        method: column
        encoding: A
        prefix: "ENSEMBL:"
        prioritize:
          - Gene
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: "UBERON:0002405"
        - qualifier: subject_aspect_qualifier
          method: value
          encoding: "GO:0010467"
        - qualifier: subject_context_qualifier
          method: value
          encoding: UMLS:C3826857
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Supplementary_Data_2 captures human single-cell immune eQTL gene-expression traits regionally genetically correlated with disease GWAS liability traits; reported significant correlations satisfy FDR < 0.01.

  - source:
      sheet: Supplementary_Data_5
    statement:
      subject:
        method: column
        encoding: A
        prioritize:
          - Protein
          - Gene
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: UBERON:0001969
        - qualifier: subject_aspect_qualifier
          method: value
          encoding: UMLS:C0428479
        - qualifier: subject_context_qualifier
          method: value
          encoding: UMLS:C0597336
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Supplementary_Data_5 captures human plasma pQTL protein abundance traits regionally genetically correlated with disease GWAS liability traits; reported significant correlations satisfy FDR < 0.01.
