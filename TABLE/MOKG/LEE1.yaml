template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/LEE1.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9616573/bin/supplementary_data_ddac040.xlsx
    row_slice: [1, auto]
  provenance:
    repo: PMC
    publication: PMC9616573
    contributors:
      - kind: curation
        name: JC Roach
        date: 19 JAN 2026
        organizations:
          - Institute for Systems Biology
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3
      - kind: tool
        name: tablassist
        date: 29 APR 2026
  statement:
    predicate: regulates
    subject:
      method: value
      prioritize:
        - Gene
    object:
      method: column
      encoding: A
      prioritize:
        - Gene
      explode_by: ";"
  annotations:
    - annotation: p value
      method: column
      encoding: D
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: sample size
      method: value
      encoding: 5
    - annotation: assertion method
      method: value
      encoding: "Student's t-test"
    - annotation: multiple testing correction method
      method: value
      encoding: "Benjamini-Hochberg"
    - annotation: miscellaneous notes
      method: value
      encoding: "Deleterious variants in CRLS1 lead to cardiolipin deficiency and cause an autosomal recessive multi-system mitochondrial disease. Log2 ratio of protein expression (Patient/WT) from DIA mass spectrometry processed with Spectronaut directDIA."

sections:
  - source:
      sheet: "Patient cells"
    statement:
      subject:
        encoding: CRLS1
        taxon: 9606
      object:
        taxon: 9606
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: "NCBITaxon:9606"
        - qualifier: object_aspect_qualifier
          method: value
          encoding: expression

  - source:
