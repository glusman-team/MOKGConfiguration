template:
  syntax: TC3
  status: beta

  source:
    kind: excel
    local: ./DATALAKE/CORREIA2.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11530135/bin/jciinsight-9-178645-s131.xlsx
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - Pathway
      taxon: 9606
      regex:
        - pattern: "^WP"
          replacement: "WIKIPATHWAYS:WP"
        - pattern: "^R-HSA-"
          replacement: "REACT:R-HSA-"
    predicate: correlated_with
    object:
      method: value
      encoding: mitochondrial disease
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: "11530135"
    contributors:
      - kind: curation
        name: JC Roach
        date: Dec 31, 2025
        organizations:
          - Institute for Systems Biology

  annotations:
    - annotation: sample size
      method: value
      encoding: 84
    - annotation: multiple testing correction method
      method: value
      encoding: "Differentially enriched gene sets are labeled according to a normalized enrichment score (NES) |1.3| or |1.3| and a q value < 0.05, presented as Log10 q value"
    - annotation: assertion method
      method: value
      encoding: "Gene set enrichment analysis (GSEA), using consensus pathway annotation catalogues"
    - annotation: miscellaneous notes
      method: value
      encoding: "Quantitative proteomics of patient fibroblasts reveal biomarkers and diagnostic signatures of mitochondrial disease"

sections:
  - source:
      sheet: "Data File 5"
    annotations:
      - annotation: p value
        method: column
        encoding: H
      - annotation: relationship strength
        method: column
        encoding: E
