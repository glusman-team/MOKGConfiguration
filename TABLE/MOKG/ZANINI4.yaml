template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/41591_2024_3142_MOESM3_ESM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/38703046/bin/41591_2024_3142_MOESM3_ESM.xlsx
    sheet: "Supplementary Table 4"
    row_slice:
      - 4
      - auto

  statement:
    subject:
      method: column
      encoding: L
      prioritize:
        - Protein
      regex:
        - pattern: "_\\d+$"
          replacement: ""
      explode_by: " , "
    predicate: associated_with
    object:
      method: column
      encoding: A
      prioritize:
        - Disease
      regex:
        - pattern: "Coeliac"
          replacement: "Celiac"
        - pattern: " +$"
          replacement: ""
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: PMC38703046
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3 syntax

  annotations:
    - annotation: relationship_strength
      method: column
      encoding: F
    - annotation: sample_size
      method: column
      encoding: I
    - annotation: assertion_method
      method: value
      encoding: Cox regression
