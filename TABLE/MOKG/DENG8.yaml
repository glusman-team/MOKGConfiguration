template:
  syntax: TC3
  status: beta
  source:
    kind: excel
    url: https://ars.els-cdn.com/content/image/1-s2.0-S0092867424012686-mmc7.xlsx
    local: ./DATALAKE/DENG8.xlsx
    sheet: Table S7
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
        - Protein
    predicate: associated_with
    object:
      method: value
      encoding: multimorbidity level
      prioritize:
        - ClinicalMeasurement
  provenance:
    repo: PMID
    publication: "39579765"
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 09 JAN 2025
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: cluster
      method: column
      encoding: A
    - annotation: odds ratio [95% CI]
      method: column
      encoding: C
    - annotation: odds ratio
      method: column
      encoding: C
      regex:
        - pattern: '^([^\s]+).*$'
          replacement: "${1}"
    - annotation: 95% confidence interval
      method: column
      encoding: C
      regex:
        - pattern: '^[^\[]*\[([^\]]+)\]$'
          replacement: "${1}"
    - annotation: 95% confidence interval lower bound
      method: column
      encoding: C
      regex:
        - pattern: '^.*\[([^\]-]+)-[^\]]+\]$'
          replacement: "${1}"
    - annotation: 95% confidence interval upper bound
      method: column
      encoding: C
      regex:
        - pattern: '^.*\[[^\]-]+-([^\]]+)\]$'
          replacement: "${1}"
    - annotation: raw p value
      method: column
      encoding: D
    - annotation: Bonferroni-adjusted p value
      method: column
      encoding: E
    - annotation: sample size
      method: value
      encoding: 53026
    - annotation: assertion method
      method: value
      encoding: ordinal regression
    - annotation: outcome measure
      method: value
      encoding: cluster-specific multimorbidity level
    - annotation: statistical measure
      method: value
      encoding: odds ratio with 95% confidence interval
    - annotation: multiple testing correction method
      method: value
      encoding: Bonferroni
    - annotation: miscellaneous notes
      method: value
      encoding: Table S7 reports associations between proteins and study-defined disease multimorbidity clusters; the cluster label is preserved as metadata rather than treated as an ontology-grounded object.
