template:
  syntax: TC3
  status: beta

  source:
    kind: excel
    local: ./DATALAKE/MIN5.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10622416/bin/41467_2023_42626_MOESM8_ESM.xlsx
    sheet: "Sheet 1"
    row_slice:
      - 1
      - auto

  statement:
    subject:
      method: column
      encoding: C
      regex:
        - pattern: "^CHEMBL"
          replacement: "CHEMBL.COMPOUND:CHEMBL"
      prioritize:
        - Drug
        - SmallMolecule
        - ChemicalEntity

    predicate: affects

    object:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene

    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: PMC10622416
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3; added species_context_qualifier and interaction type annotation
      - kind: tool
        name: tablassist
        date: 11 MAY 2026

  annotations:
    - annotation: relationship strength
      method: column
      encoding: F
    - annotation: interaction type
      method: column
      encoding: B
    - annotation: assertion method
      method: value
      encoding: Unspecified score
    - annotation: miscellaneous notes
      method: value
      encoding: Our findings suggest that nilotinib or other small molecules inhibiting DDR2 may also be viable therapeutic candidates in PSP. We provide a list of small molecule inhibitors retrieved from the Drug Gene Interaction database (DGIdb) in Supplementary Data 5.
