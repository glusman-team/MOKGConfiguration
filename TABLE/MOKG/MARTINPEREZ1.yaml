template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/MARTINPEREZ1.xlsx
    url: https://pmc-oa-opendata.s3.amazonaws.com/PMC8017771.1/NIHMS1644812-supplement-1644812_Supp_Tab1.xlsx
    sheet: Supp.Table1A_log2 LFQ intensity
    row_slice:
      - 3
      - auto
  statement:
    predicate: affects
    object:
      method: column
      encoding: B
      prefix: "UniProtKB:"
      regex:
        - pattern: ";.*$"
          replacement: ""
        - pattern: "-[0-9]+$"
          replacement: ""
      prioritize:
        - Protein
      taxon: 10090
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000955
      - qualifier: object_aspect_qualifier
        method: value
        encoding: abundance
  provenance:
    repo: PMC
    publication: PMC8017771
    contributors:
      - kind: curation
        name: JC Roach
        date: 11 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 29 APR 2026
  annotations:
    - annotation: assertion method
      method: value
      encoding: Student's t-test
    - annotation: measurement scale
      method: value
      encoding: log2 LFQ intensity
    - annotation: source protein ids
      method: column
      encoding: A
    - annotation: majority protein ids
      method: column
      encoding: B
    - annotation: protein name
      method: column
      encoding: C
    - annotation: gene symbols
      method: column
      encoding: D
    - annotation: miscellaneous notes
      method: value
      encoding: Whole-brain mouse proteomics table; object maps the first majority UniProt accession from column B after semicolon truncation and isoform suffix removal.

sections:
  - source:
      reindex:
        - column: U
          comparison: gt
          comparator: 0
    statement:
      subject:
        method: value
        encoding: NCBIGene:17993
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: increased
    annotations:
      - annotation: sample size
        method: value
        encoding: 12
      - annotation: negative log10 p value
        method: column
        encoding: S
      - annotation: q value
        method: column
        encoding: T
      - annotation: relationship strength
        method: column
        encoding: U
      - annotation: test statistic
        method: column
        encoding: V
      - annotation: comparison label
        method: value
        encoding: KO_WT (Ndufs4 knockout vs wild type)

  - source:
      reindex:
        - column: U
          comparison: lt
          comparator: 0
    statement:
      subject:
        method: value
        encoding: NCBIGene:17993
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: decreased
    annotations:
