template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/4119355/bin/emmm0006-0918-SD18.xlsx
    local: ./DATALAKE/AYOGLU1.xlsx
    sheet: Ordered Score for p values
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: value
      encoding: Duchenne muscular dystrophy
      prioritize:
        - Disease
    predicate: correlated_with
    object:
      method: column
      encoding: C
      prioritize:
        - Gene
      taxon: 9606
      remove:
        - '-Ab\d*'
  provenance:
    repo: PMC
    publication: PMC4119355
    contributors:
      - kind: curation
        name: JC Roach
        date: Dec 3, 2025
        organizations:
          - Institute for Systems Biology
      - kind: curation
        name: SL Goetz
        date: Dec 12, 2025
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample_size
      method: value
      encoding: 78
    - annotation: multiple_testing_correction_method
      method: value
      encoding: none
    - annotation: assertion_method
      method: value
      encoding: nonparametric Wilcoxon rank-sum and Kruskal–Wallis tests
    - annotation: notes
      method: value
      encoding: antibody bead array platform with 384 antibodies
    - annotation: p_value
      method: column
      encoding: I
    - annotation: relationship_strength
      method: column
      encoding: D
    - annotation: miscellaneous notes
      methoc: value
      encoding: antibody bead array platform with 384 antibodies
