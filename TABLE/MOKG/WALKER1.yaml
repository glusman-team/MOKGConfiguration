template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/WALKER1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/38703046/bin/NIHMS1876340-supplement-Supplementary_Tables.xlsx

  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - Gene
        - Protein
      taxon: 9606
    predicate: associated_with
    object:
      method: value
      encoding: dementia
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0004975

  provenance:
    repo: PMC
    publication: PMC38703046
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3 syntax

sections:
  - source:
      sheet: "ST5 - Dementia Risk"
      row_slice:
        - 3
        - auto
    statement:
      subject:
        method: column
        encoding: B
      object:
        method: value
        encoding: dementia
    annotations:
      - annotation: relationship_strength
        method: column
        encoding: D
      - annotation: p_value
        method: column
        encoding: G
      - annotation: sample_size
        method: value
        encoding: 428
      - annotation: assertion_method
        method: value
        encoding: Cox proportional hazards model

