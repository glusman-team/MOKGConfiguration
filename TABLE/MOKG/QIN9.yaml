template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/QIN9.xlsx
    url: https://ndownloader.figstatic.com/files/47044431
    sheet: "TableS9 Drug-gene-asso"
    row_slice: [1, auto]
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize: [Gene]
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize: [SmallMolecule, ChemicalEntity]
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0018874
      - qualifier: subject_form_or_variant_qualifier
        method: value
        encoding: mutated
  provenance:
    repo: PMC
    publication: PMC11176916
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample_size
      method: value
      encoding: 75
    - annotation: p_value
      method: column
      encoding: F
    - annotation: multiple_testing_correction_method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship_strength
      method: column
      encoding: C
    - annotation: assertion_method
      method: value
      encoding: Ranksum test
    - annotation: miscellaneous_notes
      method: value
      encoding: "Associations between mutated genes and drug sensitivity for all significant results"

sections:
  - statement:
      predicate: associated_with_resistance_to
    source:
      reindex:
        - column: C
          comparison: gt
          comparator: 0
  - statement:
      predicate: associated_with_sensitivity_to
    source:
      reindex:
        - column: C
          comparison: lt
          comparator: 0
