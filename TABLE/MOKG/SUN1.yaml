template:
  syntax: TC3
  status: beta

  source:
    kind: excel
    local: ./DATALAKE/SUN1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10567551/bin/41586_2023_6592_MOESM3_ESM.xlsx
    sheet: ST7
    row_slice:
      - 5
      - auto

  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Protein
      regex:
        - pattern: "^.*?:"
          replacement: ""
        - pattern: ":[^:]*:[^:]*$"
          replacement: ""
      prefix: "UniProtKB:"
      explode_by: _

    predicate: biomarker_for

    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: PMC10567551
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
        comment: >-
          Migrated from TC2 to TC3; changed predicate from associated_with to
          biomarker_for; fixed Subject regex (capturing group removal); fixed
          Section 1 column swap; removed broken copysign+pow transformations;
          added species_context_qualifier
      - kind: tool
        name: tablassist
        date: 29 APR 2026

  annotations:
    - annotation: sample size
      method: value
      encoding: 54219
    - annotation: assertion method
      method: value
      encoding: "Multivariable linear regression"
    - annotation: miscellaneous notes
      method: value
      encoding: >-
        Proteomic associations with smoking, medication use, liver function,
        renal function and top 20 most prevalent diseases. Plasma proteome
        profiled via Olink Explore 3k platform (2,923 proteins) in 54,219 UK
        Biobank participants. Test statistics (two-sided, unadjusted) derived
        from multivariable linear regression. P-values are reported as
        log10-transformed from source.

