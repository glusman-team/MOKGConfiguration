template:
  syntax: TC3
  status: beta

  source:
    kind: excel
    local: ./DATALAKE/MIN1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10622416/bin/41467_2023_42626_MOESM4_ESM.xlsx
    row_slice:
      - 1
      - auto
    sheet: PSPvsCtrl

  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
        - Gene
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0019037
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000955

  provenance:
    repo: PMC
    publication: PMC10622416
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3 with improved predicate and qualifiers
      - kind: curation
        name: Skye Lane Goetz
        date: 30 JUN 2026
        organizations:
          - Institute for Systems Biology
        comment: Added meta p-value in column K to config
      - kind: tool
        name: tablassist
        date: 29 APR 2026

  annotations:
    - annotation: sample size
      method: value
      encoding: 408
    - annotation: p value
      method: column
      encoding: K
    - annotation: FDR
      method: column
      encoding: L
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: J
    - annotation: assertion method
      method: value
      encoding: Differential expression analysis using linear regression adjusting for covariates
    - annotation: miscellaneous notes
      method: value
      encoding: Cross-species systems biology analysis of progressive supranuclear palsy (PSP) identifying glial DDR2, STOM, and KANK2 as therapeutic targets. Meta-analysis of two independent RNA-seq studies.

sections:
  - source:
      sheet: PSPvsCtrl
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: PSP vs Control DEG, control is the reference group

  - source:
      sheet: CB
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Gene expression association with coiled body (CB) among PSP cases

  - source:
      sheet: TA
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Gene expression association with tufted astrocytes (TA) among PSP cases

  - source:
      sheet: NFT
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Gene expression association with neurofibrillary tangles (NFT) among PSP cases

  - source:
      sheet: TauTh
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Gene expression association with Tau threads (TauTh) among PSP cases

  - source:
      sheet: Overall
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Gene expression association with overall pathology among PSP cases
