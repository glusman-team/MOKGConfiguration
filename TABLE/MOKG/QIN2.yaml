template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/QIN2.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11401200/bin/mmc2.xlsx
    sheet: Sheet1
    row_slice: [1, auto]
  statement:
    subject:
      method: column
      encoding: C
      taxon: 9606
      prioritize: [Gene]
    predicate: associated_with_resistance_to
    object:
      method: column
      encoding: A
      remove: ["\\s*\\(.*"]
      prioritize: [SmallMolecule, ChemicalEntity]
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0018874
  provenance:
    repo: PMC
    publication: PMC11401200
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample_size
      method: value
      encoding: 969
    - annotation: relationship_strength
      method: column
      encoding: D
    - annotation: assertion_method
      method: value
      encoding: LASSO regression
    - annotation: miscellaneous_notes
      method: value
      encoding: "Gene expression - drug associations identified in LASSO regression models, related to STAR Methods"

sections:
  - statement:
      predicate: associated_with_resistance_to
    source:
      reindex:
        - column: D
          comparison: lt
          comparator: 0
  - statement:
      predicate: associated_with_sensitivity_to
    source:
      reindex:
        - column: D
          comparison: ge
          comparator: 0
