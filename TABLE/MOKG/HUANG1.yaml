template:
  syntax: TC3
  status: beta

  source:
    kind: excel
    local: ./DATALAKE/HUANG1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9835390/bin/12967_2023_3872_MOESM1_ESM.xlsx
    row_slice: [2, auto]

  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - Gene
        - Protein
      taxon: 9606
    predicate: associated_with
    object:
      method: value
      encoding: MONDO:0008315
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: subject_aspect_qualifier
        method: value
        encoding: expression

  provenance:
    repo: PMC
    publication: PMC9835390
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 28 APR 2026
        organizations:
          - Institute for Systems Biology

  annotations:
    - annotation: sample size
      method: value
      encoding: 905

sections:
  # Table S6: Univariate Cox regression of DNA replication stress-related genes
  - source:
      sheet: Table S6
    annotations:
      - annotation: p value
        method: column
        encoding: F
      - annotation: relationship strength
        method: column
        encoding: C
      - annotation: assertion method
        method: value
        encoding: COX regression
      - annotation: multiple testing correction method
        method: value
        encoding: Benjamini-Hochberg
      - annotation: miscellaneous notes
        method: value
        encoding: "Table S6: Univariate Cox regression analysis of DNA replication stress-related genes predicting prostate cancer recurrence"

  # Table S16: Spearman rank correlation between RSS and druggable genes
  - source:
      sheet: Table S16
    annotations:
      - annotation: p value
        method: column
        encoding: D
      - annotation: relationship strength
        method: column
        encoding: B
      - annotation: assertion method
        method: value
        encoding: Spearman correlation
      - annotation: multiple testing correction method
        method: value
        encoding: Benjamini-Hochberg
      - annotation: miscellaneous notes
        method: value
        encoding: "Table S16: Spearman rank correlation between replication stress signature and druggable genes in the DKFZ-PRAD cohort"

  # Table S17: Meta-analysis of differential gene expression
  - source:
      sheet: Table S17
    annotations:
      - annotation: p value
        method: column
        encoding: H
      - annotation: relationship strength
        method: column
        encoding: B
      - annotation: assertion method
        method: value
        encoding: Log2 fold change
      - annotation: multiple testing correction method
        method: value
        encoding: Benjamini-Hochberg
      - annotation: miscellaneous notes
        method: value
        encoding: "Table S17: Meta-analysis of differential gene expression between high and low replication stress signature groups across prostate cancer cohorts"
