template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./WAINBERG3.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/2001429117/bin/WAINBERG3.xlsx

  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - Protein
      regex:
        - pattern: " \\([^)]+\\)$"
          replacement: ""
    predicate: correlated_with
    object:
      method: column
      encoding: A
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606

  provenance:
    repo: PMC
    publication: PMC2001429117
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migrated from TC2 to TC3 syntax

  annotations:
    - annotation: relationship_strength
      method: column
      encoding: C
    - annotation: p_value
      method: column
      encoding: D
    - annotation: sample_size
      method: value
      encoding: 6434
    - annotation: assertion_method
      method: value
      encoding: correlation

sections:
  - source:
      sheet: "Proteomics, by disease"
      row_slice:
        - 1
        - auto
    statement:
      subject:
        method: column
        encoding: B
      object:
        method: column
        encoding: A

  - source:
      sheet: "Proteomics, by analyte"
      row_slice:
        - 1
        - auto
    statement:
      subject:
        method: column
        encoding: A
      object:
        method: column
        encoding: B
