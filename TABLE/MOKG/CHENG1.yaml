template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/CHENG1.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/7878905/bin/41467_2020_20877_MOESM4_ESM.xlsx
    row_slice:
      - 5
      - 184
    sheet: SD4
  provenance:
    repo: PMC
    publication: PMC7878905
    contributors:
      - kind: curation
        name: JC Roach
        date: 27 DEC 2025
        organizations:
          - Institute for Systems Biology
  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
        - Gene
    predicate: genetically_associated_with
    object:
      method: column
      encoding: A
      prioritize:
        - SmallMolecule
        - ChemicalEntity
      regex:
        - pattern: "\\*+$"
          replacement: ""
        - pattern: "\\s*\\([A-Za-z0-9\\-]+\\)$"
          replacement: ""
        - pattern: "\\s+$"
          replacement: ""
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001088
      - qualifier: object_aspect_qualifier
        method: value
        encoding: abundance
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0005300
  annotations:
    - annotation: sample_size
      method: value
      encoding: 4864
    - annotation: multiple_testing_correction_method
      method: value
      encoding: genome-wide significance threshold (P<2.2E-6)
    - annotation: assertion_method
      method: value
      encoding: Rare-variant gene-based association using BURDEN and SKAT
    - annotation: miscellaneous_notes
      method: value
      encoding: Supplementary Data 4 reports rare-variant gene-based associations between genes and urine metabolite abundance in the GCKD chronic kidney disease cohort
    - annotation: skat_p_value
      method: column
      encoding: F
    - annotation: burden_effect
      method: column
      encoding: D
    - annotation: burden_p_value
      method: column
      encoding: C
    - annotation: burden_standard_error
      method: column
      encoding: E
