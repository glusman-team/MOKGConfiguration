template:
  syntax: TC3
  status: beta
  source:
    kind: excel
    local: ./DATALAKE/QIN3.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11401200/bin/mmc3.xlsx
    sheet: Sheet1
    row_slice: [1, auto]
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prefix: "ENSEMBL:"
      prioritize: [Gene, Protein]
      remove:
        - "_RSS$"
        - "_intercept_$"
        - "_R2$"
    predicate: regulates
    object:
      method: column
      encoding: B
      taxon: 9606
      prioritize: [Gene, Protein]
      remove:
        - "_RSS$"
        - "_intercept_$"
        - "_R2$"
      regex:
        - pattern: "^ENSG"
          replacement: "ENSEBL:ensg"
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC11401200
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 29 APR 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 969
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: LASSO Regression
    - annotation: miscellaneous notes
      method: value
      encoding: "Gene regulatory network: regulator genes affecting target gene expression identified via LASSO regression. Coefficients indicate direction and magnitude of regulation."

sections:
  - statement:
      predicate: regulates
    source:
      reindex:
        - column: C
          comparison: gt
          comparator: 0
    annotations:
      - annotation: regulation direction
        method: value
        encoding: "positive (upregulation)"
  - statement:
      predicate: regulates
    source:
      reindex:
        - column: C
          comparison: lt
          comparator: 0
    annotations:
      - annotation: regulation direction
        method: value
        encoding: "negative (downregulation)"
