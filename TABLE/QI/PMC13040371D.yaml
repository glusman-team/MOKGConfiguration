template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13040371_gene_category_analysis.xlsx
    url: https://example.com/PMC13040371_gene_category_analysis.xlsx
    sheet: "Sheet1"
    row_slice: [1, auto]

  statement:
    subject:
      method: column
      encoding: A
      prioritize: [Gene]
    predicate: has_part
    object:
      method: column
      encoding: B
      prioritize: [BiologicalProcess]

  provenance:
    repo: PMC
    publication: "PMC13040371"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
    - annotation: gene_symbol
      method: column
      encoding: A
    - annotation: entrez_id
      method: column
      encoding: C
      regex:
        - pattern: "^(\\d+)$"
          replacement: "NCBIGene:$1"
    - annotation: bigc_category
      method: column
      encoding: D
    - annotation: functional_description
      method: column
      encoding: E
    - annotation: pathway_count
      method: column
      encoding: F
    - annotation: disease_associations
      method: column
      encoding: G
      explode_by: ";"

sections:
  - statement:
      subject:
        method: column
        encoding: A
        prioritize: [Gene]
      predicate: participates_in
      object:
        method: column
        encoding: B
        prioritize: [Pathway]
    annotations:
      - annotation: pathway_evidence
        method: column
        encoding: H

  - statement:
      subject:
        method: column
        encoding: B
        prioritize: [BiologicalProcess]
      predicate: associated_with
      object:
        method: column
        encoding: D
        prioritize: [Disease]
    annotations:
      - annotation: functional_relevance
        method: column
        encoding: E