template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: .ledger/source/PMC13134772.1/TableS5.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13134772/bin/TableS5.xlsx
    sheet: Table S5
    row_slice:
      - 26
      - 53

  statement:
    subject:
      method: column
      encoding: __UNNAMED__2
      regex:
        - pattern: "^% of (.+)$"
          replacement: "$1"
      prioritize:
        - Cell
        - AnatomicalEntity
      taxon: 9606
