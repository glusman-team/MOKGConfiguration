template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/jciinsight-11-194171-s296.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13134718/bin/jciinsight-11-194171-s296.xlsx
    sheet: "Fig. 2A"
    row_slice:
      - 1
      - auto
    reindex:
      - column: A
        comparison: ne
        comparator: "Ingenuity Canonical Pathways"

  statement:
    subject:
      method: column
      encoding: E
      prioritize:
        - Gene
      explode_by: ","
      regex:
        - pattern: "/[A-Z0-9]+"
          replacement: ""
      remove:
        - "^\\s*Molecules$"
    predicate: participates_in
    object:
      method: column
      encoding: A
      remove:
        - "^\\s*Ingenuity Canonical Pathways$"

  provenance:
    repo: PMC
    publication: PMC13134718
    contributors:
      - kind: curation
        name: Discovery Pipeline (tablassist)
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: Tablassert Builder
        date: 06 MAY 2026

  annotations:
    - annotation: Pathway -log(p-value)
      method: column
      encoding: B
    - annotation: Activation z-score
      method: column
      encoding: D
    - annotation: Pathway Ratio
      method: column
      encoding: C
