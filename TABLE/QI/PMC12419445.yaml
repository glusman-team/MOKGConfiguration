template:
  syntax: TC3
  status: alpha
  source:
    kind: text
    local: ./data/PMC12419445_Sheet1.csv
    url: https://placeholder-url-for-supplementary-table/PMC12419445_S1.csv
    delimiter: ","
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      remove:
        - "^rs"
      prefix: "dbSNP:"
      taxon: 9606
      prioritize:
        - SequenceVariant
      avoid:
        - Gene
    predicate: has_variant_part
    object:
      method: column
      encoding: D
      regex:
        - pattern: " levels$"
          replacement: ""
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC12419445
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
        comment: Initial configuration from supplementary table analysis
  annotations:
    - annotation: outcome
      method: column
      encoding: F
    - annotation: beta
      method: column
      encoding: J
    - annotation: effect allele frequency
      method: column
      encoding: K
    - annotation: p value
      method: column
      encoding: M
    - annotation: proxy snp
      method: column
      encoding: N
    - annotation: miscellaneous notes
      method: value
      encoding: "Genetic instruments for sex hormone exposures tested against autoimmune diseases in forward Mendelian randomization. Data from European-ancestry populations (UK Biobank, FinnGen). Proxy SNPs indicate r² > 0.80 linkage disequilibrium with primary SNP."
