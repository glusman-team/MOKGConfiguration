template:
  syntax: TC3
  status: alpha
  
  source:
    kind: text
    local: ./DATALAKE/PMC10875510_TABLE_S1.csv
    url: https://example.com/PMC10875510_TABLE_S1.csv
    row_slice: [1, auto]
    delimiter: ","
  
  statement:
    subject:
      method: column
      encoding: A
      prioritize: [Attribute]
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize: [ClinicalAttribute]
  
  provenance:
    repo: PMC
    publication: "10875510"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
        comment: Data preprocessing standards from Chinese national psoriasis registry
  
  annotations:
    - annotation: preprocessing_method
      method: column
      encoding: C
      fill: forward
    - annotation: data_quality_metric
      method: column
      encoding: D
      fill: forward
    - annotation: sample_size_included
      method: column
      encoding: E
      fill: forward
    - annotation: exclusion_criteria
      method: column
      encoding: F
      fill: forward
    - annotation: data_source
      method: value
      encoding: "Chinese National Psoriasis Registry"
    - annotation: study_period
      method: value
      encoding: "August 2020 - September 2021"
    - annotation: registry_coverage
      method: value
      encoding: "22,425 patients"
    - annotation: geographic_scope
      method: value
      encoding: "National (China)"
    - annotation: pandemic_context
      method: value
      encoding: "COVID-19 pandemic period with lockdown stratification"