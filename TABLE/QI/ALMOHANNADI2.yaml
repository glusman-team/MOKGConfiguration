template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./DATALAKE/PMC13112774.1.txt
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13112774/
    delimiter: "\t"
    row_slice:
      - 145
      - 869
    reindex:
      - column: A
        comparison: ne
        comparator: "Tier 2"
      - column: A
        comparison: ne
        comparator: "Tier 3"

  statement:
    subject:
      method: column
      encoding: C
      prioritize:
        - Gene
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: column
      encoding: G
      regex:
        - pattern: "\u2009\\+\u2009"
          replacement: "|"
        - pattern: "\\+"
          replacement: "|"
      explode_by: "|"
      prioritize:
        - Disease

  annotations:
    - annotation: Z-score
      method: column
      encoding: H
    - annotation: Tier
      method: column
      encoding: K
    - annotation: Tumor-type classification
      method: column
      encoding: B
    - annotation: Confidence
      method: column
      encoding: I

  provenance:
    repo: PMC
    publication: PMC13112774
    contributors:
      - kind: curation
        name: Discovery Pipeline
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
