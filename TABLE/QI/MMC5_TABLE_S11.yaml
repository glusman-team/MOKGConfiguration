template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/mmc5.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC12790996/bin/mmc5.xlsx
    sheet: "Table S11"
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prefix: "ENSEMBL:"
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: "MONDO:0005083"
      prioritize:
        - Disease

  provenance:
    repo: PMC
    publication: PMC12790996
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: Auto-extracted from supplementary tables
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
