      method: column
      encoding: G
    - annotation: pLoF_protein_AF0.01_SKAT
      method: column
      encoding: H
    - annotation: pLoF_protein_splice_AF0.001_Burden
      method: column
      encoding: I
    - annotation: pLoF_protein_splice_AF0.001_SKAT
      method: column
      encoding: J
    - annotation: pLoF_protein_splice_AF0.005_Burden
      method: column
      encoding: K
