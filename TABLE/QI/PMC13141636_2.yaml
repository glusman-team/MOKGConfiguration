template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13141636.1__mmc3.xlsx
    url: "https://www.sciencedirect.com/cms/attachment/pmc13141636/mmc3.xlsx"

  provenance:
    repo: PMC
    publication: PMC13141636
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
      - kind: curation
        name: "Tablassert pipeline"
        date: "06 MAY 2026"

sections:
  # S4A: Memory B cells DEGs (173 rows)
  - source:
      sheet: "Table S4A"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

  # S4B: Memory B cells DEGs (3 rows)
  - source:
      sheet: "Table S4B"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

  # S4C: GO enrichment - Gene -> participates_in -> GO term
  - source:
      sheet: "Table S4C"
    statement:
      subject:
        method: column
        encoding: B
        taxon: 9606
        prioritize:
          - Gene
        explode_by: ";"
      predicate: participates_in
      object:
        method: column
        encoding: A
        regex:
          - pattern: ".*\\(GO:(\\d+)\\)"
            replacement: "GO:$1"
        prioritize:
          - BiologicalProcess

  # S4C: GO enrichment - GO term -> related_to -> Gene
  - source:
      sheet: "Table S4C"
    statement:
      subject:
        method: column
        encoding: A
        regex:
          - pattern: ".*\\(GO:(\\d+)\\)"
            replacement: "GO:$1"
        prioritize:
          - BiologicalProcess
      predicate: related_to
      object:
        method: column
        encoding: B
        taxon: 9606
        prioritize:
          - Gene
        explode_by: ";"
