# Supplemental Table 3: Any TEAE and TESAE related to SCD totaling ≥2.0% in each study
# Table captures sickle cell disease-related adverse events for RETRO and PROSPECT studies

table:
  name: "Supplemental Table 3 - SCD-Related Adverse Events"
  description: "Treatment-emergent adverse events (TEAE) and serious adverse events (TESAE) related to sickle cell disease (SCD) occurring in ≥2.0% of participants in each study"
  source: "PMC13141567"
  columns:
    - name: "study"
      type: "string"
      description: "Study name (RETRO or PROSPECT)"
      required: true
    - name: "study_period"
      type: "string"
      description: "Study period (e.g., '12 months', 'up to 60 months')"
      required: true
    - name: "n_total"
      type: "integer"
      description: "Total number of participants in the study"
      required: true
    - name: "ae_any_type"
      type: "string"
      description: "Type of adverse event (Any AE or Any serious AE)"
      required: true
    - name: "sca_with_crisis_count"
      type: "integer"
      description: "Number of participants with SCA with crisis"
      required: true
    - name: "sca_with_crisis_percent"
      type: "float"
      description: "Percentage of participants with SCA with crisis"
      required: true
    - name: "acs_count"
      type: "integer"
      description: "Number of participants with Acute Chest Syndrome (ACS)"
      required: true
    - name: "acs_percent"
      type: "float"
      description: "Percentage of participants with ACS"
      required: true
    - name: "priapism_count"
      type: "integer"
      description: "Number of participants with Priapism"
      required: true
    - name: "priapism_percent"
      type: "float"
      description: "Percentage of participants with Priapism"
      required: true
    - name: "skin_ulcer_count"
      type: "integer"
      description: "Number of participants with Skin ulcer"
      required: true
    - name: "skin_ulcer_percent"
      type: "float"
      description: "Percentage of participants with Skin ulcer"
      required: true
    - name: "sickle_cell_anemia_count"
      type: "integer"
      description: "Number of participants with Sickle cell anemia"
      required: true
    - name: "sickle_cell_anemia_percent"
      type: "float"
      description: "Percentage of participants with Sickle cell anemia"
      required: true
    - name: "pneumonia_count"
      type: "integer"
      description: "Number of participants with Pneumonia"
      required: true
    - name: "pneumonia_percent"
      type: "float"
      description: "Percentage of participants with Pneumonia"
      required: true
    - name: "osteonecrosis_count"
      type: "integer"
      description: "Number of participants with Osteonecrosis"
      required: true
    - name: "osteonecrosis_percent"
      type: "float"
      description: "Percentage of participants with Osteonecrosis"
      required: true
    - name: "deep_vein_thrombosis_count"
      type: "integer"
      description: "Number of participants with Deep vein thrombosis"
      required: true
    - name: "deep_vein_thrombosis_percent"
      type: "float"
      description: "Percentage of participants with Deep vein thrombosis"
      required: true

transforms:
  # Calculate percentages for all adverse event counts
  - column: "sca_with_crisis_count"
    formula: "sca_with_crisis_count * 100.0 / n_total"
    new_column: "sca_with_crisis_percent"
  
  - column: "acs_count"
    formula: "acs_count * 100.0 / n_total"
    new_column: "acs_percent"
  
  - column: "priapism_count"
    formula: "priapism_count * 100.0 / n_total"
    new_column: "priapism_percent"
  
  - column: "skin_ulcer_count"
    formula: "skin_ulcer_count * 100.0 / n_total"
    new_column: "skin_ulcer_percent"
  
  - column: "sickle_cell_anemia_count"
    formula: "sickle_cell_anemia_count * 100.0 / n_total"
    new_column: "sickle_cell_anemia_percent"
  
  - column: "pneumonia_count"
    formula: "pneumonia_count * 100.0 / n_total"
    new_column: "pneumonia_percent"
  
  - column: "osteonecrosis_count"
    formula: "osteonecrosis_count * 100.0 / n_total"
    new_column: "osteonecrosis_percent"
  
  - column: "deep_vein_thrombosis_count"
    formula: "deep_vein_thrombosis_count * 100.0 / n_total"
    new_column: "deep_vein_thrombosis_percent"

