          - Gene
        explode_by: ", "
      predicate: expressed_in
      object:
        method: column
        encoding: A
        prioritize:
          - Cell
    annotations:
      - annotation: gene_list_type
        method: value
        encoding: signature_genes

  - statement:
      subject:
        method: column
        encoding: D
        taxon: 9606
        prioritize:
          - Gene
        explode_by: ", "
      predicate: expressed_in
      object:
        method: column
        encoding: A
        prioritize:
          - Cell
    annotations:
      - annotation: gene_list_type
        method: value
        encoding: DEGs
