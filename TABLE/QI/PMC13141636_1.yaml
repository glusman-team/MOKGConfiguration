template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13141636.1__mmc2.xlsx
    url: "https://www.sciencedirect.com/cms/attachment/pmc13141636/mmc2.xlsx"
    sheet: "Table S2"

  provenance:
    repo: PMC
    publication: PMC13141636
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
      - kind: curation
        name: "Tablassert pipeline"
        date: "06 MAY 2026"

sections:
