template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./DATALAKE/BASELINE_TABLE_S2.csv
    url: https://raw.githubusercontent.com/skyeav/TableConfigs/main/TABLE/QI/BASELINE_TABLE_S2.csv
    delimiter: ","
    row_slice: [1, auto]

  statement:
    subject:
      method: column
      encoding: A
      prioritize: [PhenotypicFeature, ClinicalAttribute]
      taxon: 9606
    predicate: associated_with
    object:
      method: column
      encoding: C
      regex:
        - pattern: "%"
          replacement: ""
      transformations:
        - function: copysign
          arguments: [values, 1]
    qualifiers:
      - qualifier: population_context_qualifier
        method: value
        encoding: "Korean population"

  provenance:
    repo: PMC
    publication: "PMC12263980"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
        comment: Categorical variables from COVID-19 psoriasis study baseline characteristics

  annotations:
    - annotation: table_source
      method: value
      encoding: "Table S2. Baseline characteristics of individuals who experienced COVID-19 infection"

    - annotation: study_population
      method: value
      encoding: "Korean National Health Insurance Service claims data (2018-2021)"

    - annotation: sample_size
      method: value
      encoding: "167,746 psoriasis patients, 866,582 controls"

    - annotation: data_type
      method: value
      encoding: "Categorical variables (Sex, Residence, Smoking, Comorbidities, Charlson index, Timing, Vaccine)"

    - annotation: statistical_test
      method: value
      encoding: "Chi-squared test for categorical variables"

    - annotation: significance_level
      method: value
      encoding: "P < 0.05 considered statistically significant"