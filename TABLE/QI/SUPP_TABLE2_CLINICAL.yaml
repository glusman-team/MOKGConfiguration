template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/41467_2025_67769_MOESM4_ESM.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC12847772/
    sheet: Supplementary Table 2
    row_slice:
      - 1
      - auto

  statement:
    subject:
      method: column
      encoding: B
      fill: forward
      regex:
        - pattern: "^Healthy controls$"
          replacement: "Healthy Volunteers"
        - pattern: "^Brochiectasis$"
          replacement: "Bronchiectasis"
        - pattern: "^Bronchiectasis-asthma overlap$"
          replacement: "Bronchiectasis,Asthma"
      explode_by: ","
      prioritize:
        - Disease
        - PopulationOfIndividualOrganisms
        - Cohort
    predicate: related_to

  provenance:
    repo: PMC
    publication: PMC12847772
    contributors:
      - kind: tool
        name: tablassist
        date: 07 MAY 2026
      - kind: curation
        name: Tablassist-pioneer
        date: 07 MAY 2026
        organizations:
          - Institute for Systems Biology

