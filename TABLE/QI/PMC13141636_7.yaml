template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/mmc8.xlsx
    url: "https://www.sciencedirect.com/cms/attachment/pmc13141636/mmc8.xlsx"

  provenance:
    repo: PMC
    publication: PMC13141636
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
      - kind: curation
        name: "Tablassert pipeline"
        date: "06 MAY 2026"

sections:
  # S9A: Th2 and Tfh cells DEGs (285 rows)
  - source:
      sheet: "S9A"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

