  validation:
    rules:
      - "ensure n_total > 0"
      - "ensure all count values are non-negative"
      - "ensure percentages are between 0 and 100"
      - "ensure study is either 'RETRO' or 'PROSPECT'"
      - "validate that severity values are 'Mild', 'Moderate', or 'Severe'"
      - "ensure that severity-specific counts sum to total counts"
      - "validate that events ≥2.0% are captured correctly"
