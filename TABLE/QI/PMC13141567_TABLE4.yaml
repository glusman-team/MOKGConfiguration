template:
  name: "PMC13141567_TABLE4"
  description: "Supplemental Table 4: Any treatment-related AEs unrelated to SCD totaling ≥2.0% in each study"
  version: "1.0"

sections:
  table:
    name: "Supplemental Table 4 - Treatment-Related AEs Unrelated to SCD"
    description: "Treatment-related adverse events (AEs) unrelated to sickle cell disease (SCD) occurring in ≥2.0% of participants in each study, categorized by severity"
    source: "PMC13141567"
    columns:
      - name: "study"
        type: "string"
        description: "Study name (RETRO or PROSPECT)"
        required: true
      - name: "study_period"
        type: "string"
        description: "Study period (e.g., '12 months', 'up to 60 months')"
        required: true
      - name: "n_total"
        type: "integer"
        description: "Total number of participants in the study"
        required: true
      - name: "preferred_term"
        type: "string"
        description: "Preferred term for the adverse event"
        required: true
      - name: "severity"
        type: "string"
        description: "Severity level (Mild, Moderate, Severe)"
        required: true
      - name: "ae_count"
        type: "integer"
        description: "Number of participants with this adverse event"
        required: true
      - name: "diarrhea_mild"
        type: "integer"
        description: "Number of participants with mild diarrhea"
        required: true
      - name: "diarrhea_moderate"
        type: "integer"
        description: "Number of participants with moderate diarrhea"
        required: true
      - name: "diarrhea_severe"
        type: "integer"
        description: "Number of participants with severe diarrhea"
        required: true
      - name: "diarrhea_total"
        type: "integer"
        description: "Total number of participants with diarrhea (all severities)"
        required: true
      - name: "headache_mild"
        type: "integer"
        description: "Number of participants with mild headache"
        required: true
      - name: "headache_moderate"
        type: "integer"
        description: "Number of participants with moderate headache"
        required: true
      - name: "headache_severe"
        type: "integer"
        description: "Number of participants with severe headache"
        required: true
      - name: "headache_total"
        type: "integer"
        description: "Total number of participants with headache (all severities)"
        required: true
      - name: "nausea_mild"
        type: "integer"
        description: "Number of participants with mild nausea"
        required: true
      - name: "nausea_moderate"
        type: "integer"
        description: "Number of participants with moderate nausea"
        required: true
      - name: "nausea_severe"
        type: "integer"
        description: "Number of participants with severe nausea"
        required: true
      - name: "nausea_total"
        type: "integer"
        description: "Total number of participants with nausea (all severities)"
        required: true

  transforms:
    # Calculate percentages for all adverse event counts
    - column: "ae_count"
      formula: "ae_count * 100.0 / n_total"
      new_column: "ae_percent"
    
    # Calculate totals and percentages for each adverse event type
    - column: "diarrhea_mild"
      formula: "diarrhea_mild * 100.0 / n_total"
      new_column: "diarrhea_mild_percent"
    
    - column: "diarrhea_moderate"
      formula: "diarrhea_moderate * 100.0 / n_total"
      new_column: "diarrhea_moderate_percent"
    
    - column: "diarrhea_severe"
      formula: "diarrhea_severe * 100.0 / n_total"
      new_column: "diarrhea_severe_percent"
    
    - column: "diarrhea_total"
      formula: "diarrhea_mild + diarrhea_moderate + diarrhea_severe"
      new_column: "diarrhea_total"
    
    - column: "diarrhea_total_percent"
      formula: "diarrhea_total * 100.0 / n_total"
      new_column: "diarrhea_total_percent"
    
    - column: "headache_mild"
      formula: "headache_mild * 100.0 / n_total"
      new_column: "headache_mild_percent"
    
    - column: "headache_moderate"
      formula: "headache_moderate * 100.0 / n_total"
      new_column: "headache_moderate_percent"
    
    - column: "headache_severe"
      formula: "headache_severe * 100.0 / n_total"
      new_column: "headache_severe_percent"
    
    - column: "headache_total"
      formula: "headache_mild + headache_moderate + headache_severe"
      new_column: "headache_total"
    
    - column: "headache_total_percent"
      formula: "headache_total * 100.0 / n_total"
      new_column: "headache_total_percent"
    
    - column: "nausea_mild"
      formula: "nausea_mild * 100.0 / n_total"
      new_column: "nausea_mild_percent"
    
    - column: "nausea_moderate"
      formula: "nausea_moderate * 100.0 / n_total"
      new_column: "nausea_moderate_percent"
    
    - column: "nausea_severe"
      formula: "nausea_severe * 100.0 / n_total"
      new_column: "nausea_severe_percent"
    
    - column: "nausea_total"
      formula: "nausea_mild + nausea_moderate + nausea_severe"
      new_column: "nausea_total"
    
    - column: "nausea_total_percent"
      formula: "nausea_total * 100.0 / n_total"
      new_column: "nausea_total_percent"

