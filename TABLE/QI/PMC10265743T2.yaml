      method: value
      encoding: "MONDO:0005083"
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC10265743
    contributors:
      - kind: curation
        name: Antigravity
        date: "2026-05-06"
      - kind: tool
        name: tablassist
        date: "2026-05-06"
  annotations:
    - annotation: genomic_context
      method: column
      encoding: E
    - annotation: odds_ratio
      method: column
      encoding: G
