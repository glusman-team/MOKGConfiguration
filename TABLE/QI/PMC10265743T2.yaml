template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/Table2.XLSX
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10265743/bin/Table2.XLSX
    sheet: Sheet1
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - SequenceVariant
      prefix: "dbSNP:"
      taxon: 9606
