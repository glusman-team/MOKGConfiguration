template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/TableS5.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13134772/bin/TableS5.xlsx
    sheet: Table S5
    row_slice:
      - 53
      - 56

  statement:
    subject:
      method: value
      encoding: CL:0000236
      prioritize:
        - Cell
      taxon: 9606
    predicate: produces
    object:
      method: column
      encoding: __UNNAMED__2
      regex:
        - pattern: "µg/mL of (IgG anti-RBD)"
          replacement: "$1"
      prioritize:
        - Protein
      taxon: 9606

  provenance:
    repo: PMC
    publication: PMC13134772
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
      - kind: curation
        name: Tablassert pipeline
        date: 06 MAY 2026

  annotations:
    - annotation: timepoint
      method: column
      encoding: Table S5. Linear models assessing the effects of clinical and demographic covariates on immune phenotypes, antibodies and cytokine changes.
    - annotation: p_value_AGE
      method: column
      encoding: __UNNAMED__3
    - annotation: p_value_SEX
      method: column
      encoding: __UNNAMED__4
    - annotation: p_value_CMV
      method: column
      encoding: __UNNAMED__5
    - annotation: p_value_COVID
      method: column
      encoding: __UNNAMED__6
    - annotation: IgG_level_under_50
      method: column
      encoding: __UNNAMED__7
    - annotation: IgG_level_over_60
      method: column
      encoding: __UNNAMED__8
    - annotation: IgG_level_female
      method: column
      encoding: __UNNAMED__9
    - annotation: IgG_level_male
      method: column
      encoding: __UNNAMED__10
    - annotation: IgG_level_CMV_negative
      method: column
      encoding: __UNNAMED__11
    - annotation: IgG_level_CMV_positive
      method: column
      encoding: __UNNAMED__12
    - annotation: IgG_level_COVID_negative
      method: column
      encoding: __UNNAMED__13
    - annotation: IgG_level_COVID_positive
      method: column
      encoding: __UNNAMED__14
    - annotation: CI_95_lower_upper_under_50
      method: column
      encoding: __UNNAMED__15
    - annotation: CI_95_lower_upper_over_60
      method: column
      encoding: __UNNAMED__16
    - annotation: CI_95_lower_upper_female
      method: column
      encoding: __UNNAMED__17
    - annotation: CI_95_lower_upper_male
