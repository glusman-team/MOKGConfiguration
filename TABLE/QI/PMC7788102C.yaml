template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./.ledger/il-23-il-17-axis-sars-cov-2/data/PMC7788102/source/PMC7788102.2/mmc1.xlsx
    url: https://ftp.ncbi.nlm.nih.gov/pub/pmc/supplemental/PMC7788102/mmc1.xlsx
    sheet: Sup_Table 3 Interferon
    row_slice: [3, auto]
    reindex:
      - column: B
        comparison: ne
        comparator: ""
      - column: B
        comparison: ne
        comparator: "ID"
      - column: E
        comparison: lt
        comparator: 0.05

  statement:
    subject:
      method: column
      encoding: B
      remove:
        - ^NM_\d+\.\d+$
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    object:
      method: value
      encoding: MONDO:0100096
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0100096

  annotations:
    - annotation: fold regulation Group 1
      method: column
      encoding: D
    - annotation: FDR Group 1
      method: column
      encoding: E
    - annotation: fold regulation Group X
      method: column
      encoding: P
    - annotation: FDR Group X
      method: column
      encoding: Q

  provenance:
    repo: PMC
    publication: PMC7788102
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
