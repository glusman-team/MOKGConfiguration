template:
  syntax: TC3
  status: alpha
  source:
    kind: text
    local: ./DATALAKE/PMC12419445_Sheet3.csv
    url: https://placeholder-url-for-supplementary-table/PMC12419445_S3.csv
    delimiter: ","
    row_slice:
      - 1
      - auto
  statement:
    subject:
      method: column
      encoding: A
      regex:
        - pattern: " levels$"
          replacement: ""
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize:
        - Disease
    qualifiers:
      - qualifier: object_direction_qualifier
        method: column
        encoding: C
  provenance:
    repo: PMC
    publication: PMC12419445
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
        comment: Initial configuration from supplementary table analysis - heterogeneity and pleiotropy tests
  annotations:
    - annotation: Q statistic
      method: column
      encoding: D
    - annotation: Q degrees of freedom
      method: column
      encoding: E
    - annotation: Q p value
      method: column
      encoding: F
    - annotation: intercept
      method: column
      encoding: G
    - annotation: intercept standard error
      method: column
      encoding: H
    - annotation: p value
      method: column
      encoding: I
    - annotation: miscellaneous notes
      method: value
      encoding: "Heterogeneity and pleiotropy sensitivity analyses for reverse Mendelian randomization. Q statistic and p-value test for heterogeneity; intercept and p-value test for horizontal pleiotropy (MR-Egger). Significant pleiotropy (p < 0.05) suggests violations of MR assumptions."
