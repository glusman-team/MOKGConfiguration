template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/PMC13141636.1__mmc6.xlsx
    url: "https://www.sciencedirect.com/cms/attachment/pmc13141636/mmc6.xlsx"

  provenance:
    repo: PMC
    publication: PMC13141636
    contributors:
      - kind: tool
        name: tablassist
        date: "06 MAY 2026"
      - kind: curation
        name: "Tablassert pipeline"
        date: "06 MAY 2026"

sections:
  # S7A: Non-Classical Monocytes DEGs (176 rows)
  - source:
      sheet: "Table S7A"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

  # S7B: Non-Classical Monocytes DEGs (287 rows)
  - source:
      sheet: "Table S7B"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

  # S7C: Non-Classical Monocytes DEGs (176 rows)
  - source:
      sheet: "Table S7C"
    statement:
      subject:
        method: column
        encoding: A
        taxon: 9606
        prioritize:
          - Gene
      predicate: affected_by
      object:
        method: value
        encoding: UMLS:C5400806
    annotations:
      - annotation: scores
        method: column
        encoding: B
      - annotation: logfoldchanges
        method: column
        encoding: C
      - annotation: pvals
        method: column
        encoding: D
      - annotation: pvals_adj
        method: column
        encoding: E

  # S7D: GO enrichment - Gene -> participates_in -> GO term
  - source:
      sheet: "Table S7D"
    statement:
      subject:
        method: column
        encoding: B
        taxon: 9606
        prioritize:
          - Gene
        explode_by: ";"
      predicate: participates_in
      object:
        method: column
        encoding: A
        regex:
          - pattern: ".*\\(GO:(\\d+)\\)"
            replacement: "GO:$1"
        prioritize:
          - BiologicalProcess

  # S7D: GO enrichment - GO term -> related_to -> Gene
  - source:
      sheet: "Table S7D"
    statement:
      subject:
        method: column
        encoding: A
        regex:
          - pattern: ".*\\(GO:(\\d+)\\)"
            replacement: "GO:$1"
        prioritize:
          - BiologicalProcess
      predicate: related_to
      object:
        method: column
        encoding: B
        taxon: 9606
        prioritize:
          - Gene
        explode_by: ";"
