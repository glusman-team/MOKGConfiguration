template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./BASELINE_TABLE_S2.csv
    url: https://raw.githubusercontent.com/skyeav/TableConfigs/main/TABLE/QI/BASELINE_TABLE_S2.csv
    delimiter: ","
    row_slice: [1, auto]

  statement:
    subject:
      method: column
      encoding: A
    predicate: associated_with
    object:
      method: column
      encoding: D
      regex:
        - pattern: "<"
          replacement: "less_than_"
        - pattern: "≥"
          replacement: "greater_than_or_equal_to_"
      fill: forward
    qualifiers:
      - qualifier: severity_qualifier
        method: value
        encoding: "statistical_significance"

  provenance:
    repo: PMC
    publication: "PMC12263980"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
        comment: Statistical significance from COVID-19 psoriasis study baseline characteristics

  annotations:
    - annotation: table_source
      method: value
      encoding: "Table S2. Baseline characteristics of individuals who experienced COVID-19 infection"

    - annotation: study_population
      method: value
      encoding: "Korean National Health Insurance Service claims data (2018-2021)"

    - annotation: sample_size
      method: value
      encoding: "167,746 psoriasis patients, 866,582 controls"

    - annotation: data_type
      method: value
      encoding: "Statistical significance (p-values)"

    - annotation: significance_threshold
      method: value
      encoding: "P < 0.05 considered statistically significant"

    - annotation: interpretation
      method: value
      encoding: "Less values indicate stronger statistical evidence for association between variable and COVID-19 infection"