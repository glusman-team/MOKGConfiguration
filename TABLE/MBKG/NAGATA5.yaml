template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9499989/bin/mmc2.xlsx
    local: ./DATALAKE/NAGATA5.xlsx
    kind: excel
    sheet: S5
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: H
      prioritize:
        - OrganismTaxon
      remove:
        - species.*
        - ' \(.*'
      regex:
        - pattern: '\['
          replacement: ""
        - pattern: '\]'
          replacement: ""
    predicate: associated_with
    object:
      method: value
      encoding: MONDO:0100096
      prioritize:
        - Disease
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000160
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC9499989
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: column
      encoding: M
    - annotation: p value
      method: column
      encoding: N
    - annotation: q value
      method: column
      encoding: O
    - annotation: multiple testing correction method
      method: value
      encoding: Unspecified
    - annotation: relationship strength
      method: column
      encoding: K
    - annotation: assertion method
      method: value
      encoding: Wilcoxon rank-sum test
    - annotation: miscellaneous notes
      method: value
      encoding: Gut microbial changes between COVID-19 and controls
