template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9212162/bin/pntd.0010491.s004.xlsx
    local: ./DATALAKE/GOEBERT3.xlsx
    kind: excel
    sheet: species
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: .*__
          replacement: ''
        - pattern: \.
          replacement: ' '
        - pattern: _
          replacement: ' '
        - pattern: ' OTU.*'
          replacement: ''
        - pattern: 'Unclassified '
          replacement: ''
        - pattern: ' unclassified'
          replacement: ''
    predicate: associated_with
    object:
      method: value
      encoding: Helminthiasis
      prioritize:
        - Disease
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0004664
  provenance:
    repo: PMC
    publication: PMC9212162
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 66
    - annotation: p value
      method: column
      encoding: C
    - annotation: false discovery rate
      method: column
      encoding: C
    - annotation: multiple testing correction method
      method: value
      encoding: False discovery rate
    - annotation: assertion method
      method: value
      encoding: ANOVA
    - annotation: miscellaneous notes
      method: value
      encoding: Fecal-only ANOVA outputs by infection status with FDR by infection category, adjusted p values, infected and uninfected mean abundance values, and fold change.
