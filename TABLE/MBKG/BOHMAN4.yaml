template:
  syntax: TC3
  source:
    url: https://static-content.springer.com/esm/art%3A10.1186%2Fs12915-024-01887-0/MediaObjects/12915_2024_1887_MOESM1_ESM.xlsx
    local: ./DATALAKE/BOHMAN4.xlsx
    kind: excel
    sheet: Table 4
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      regex:
        - pattern: _
          replacement: " "
        - pattern: "-"
          replacement: " "
      prioritize:
        - OrganismTaxon
    predicate: associated_with
    object:
      method: value
      encoding: age
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: "upper respiratory tract"
  provenance:
    repo: PMC
    publication: PMC11040984
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 07 MAY 2026
  annotations:
    - annotation: sample size
      method: value
      encoding: 554
    - annotation: p value
      method: column
      encoding: B
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: assertion method
      method: value
      encoding: ANCOVA
    - annotation: miscellaneous notes
      method: value
      encoding: Upper respiratory tract microbiota associated with age in healthy controls. Using 10 studies with age metadata available, ANCOVA was conducted using the formula "clr ~ age + age2 + variable_region + sequencing + URT_site + region" to determine significant associations with age while accounting for URT sampling site, geographic region, sequencing method, and 16S rRNA hypervariable region. The squared age term was included to assess non-linear relationships between CLR and age. P-values were corrected for multiple comparisons using the Benjamini-Hochberg FDR correction.
