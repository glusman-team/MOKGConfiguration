template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9153113/bin/40168_2022_1271_MOESM1_ESM.xls
    local: ./DATALAKE/ZHOU29.xlsx
    kind: excel
    sheet: Table S29
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      remove:
        - .*__
        - UCG.*
        - "g  "
        - "o  "
        - norank
        - NORANK
        - "f  "
        - "p  "
        - "s  "
        - group
        - gut
      regex:
        - pattern: _
          replacement: " "
    predicate: correlated_with
    object:
      prioritize:
        - SmallMolecule
        - ChemicalEntity
        - Drug
      avoid:
        - Protein
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001988
  provenance:
    repo: PMC
    publication: PMC9153113
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
        comment: Audited — fixed species context, assertion method, row_slice, added anatomical qualifier, object prioritize, annotation labels
  annotations:
    - annotation: multiple testing correction method
      method: value
      encoding: Bonferroni
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Detailed information of the relationship between metabolites and the top 50 genera.
