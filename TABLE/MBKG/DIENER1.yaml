template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9691620/bin/NIHMS1845232-supplement-1845232_Sup_Tab_1-5.xlsx
    local: ./DATALAKE/DIENER1.xlsx
    row_slice:
      - 1
      - auto
    kind: excel
    sheet: Table S3
    reindex:
      - column: M
        comparison: lt
        comparator: 0.05
  statement:
    subject:
      method: column
      encoding: O
      regex:
        - pattern: '^\s+'
          replacement: ""
        - pattern: '^\s*(\d+)\s+'
          replacement: ""
        - pattern: '\s+(\d+)\s*$'
          replacement: ""
        - pattern: '\s*\*+\s*$'
          replacement: ""
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: ^.*\|
          replacement: ""
        - pattern: ^[^A-Za-z\s]+
          replacement: ""
        - pattern: \s+$
          replacement: ""
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC9691620
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 1569
    - annotation: p value
      method: column
      encoding: F
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: adjusted p value
      method: column
      encoding: M
    - annotation: relationship strength
      method: column
      encoding: E
    - annotation: assertion method
      method: value
      encoding: Two-sided Wald test
    - annotation: miscellaneous notes
      method: value
      encoding: Genome-microbiome interactions for blood metabolite regression models with a significant interaction term. P-values were obtained from a two-sided Wald test on the interaction term coefficient γ of an ordinary least squares regression model.
