template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11792502/bin/spectrum.01368-24-s0002.xlsx
    local: ./DATALAKE/MOTTA13.xlsx
    kind: excel
    sheet: Table S13
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: value
      encoding: GO:1903561
      prioritize:
        - CellularComponent
    predicate: affects
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: object_context_qualifier
        method: value
        encoding: Caco-2 cell
        prioritize:
          - Cell
          - CellLine
      - qualifier: object_aspect_qualifier
        method: value
        encoding: expression
    object:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
      regex:
        - pattern: \.[0-9]+$
          replacement: ''
  provenance:
    repo: PMC
    publication: PMC11792502
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 12
    - annotation: adjusted p value
      method: column
      encoding: G
    - annotation: log2 fold change
      method: column
      encoding: D
    - annotation: assertion method
      method: value
      encoding: differential expression analysis
    - annotation: miscellaneous notes
      method: value
      encoding: Table S13 reports significantly differentially expressed genes (padj ≤ 0.05) in Caco-2 cells comparing MEVs treated versus control conditions.
sections:
  - source:
      reindex:
        - column: D
          comparison: gt
          comparator: 0
    statement:
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: increased
  - source:
      reindex:
        - column: D
          comparison: lt
          comparator: 0
    statement:
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: decreased
