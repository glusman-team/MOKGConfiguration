template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10434204/bin/spectrum.03429-22-s0001.xlsx
    local: ./DATALAKE/ROMERO3.xlsx
    kind: excel
    sheet: SupplementalTable_3
    row_slice:
      - 5
      - auto
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      remove:
        - .*;
        - _1
        - _6
    predicate: correlated_with
    object:
      method: column
      encoding: D
      prioritize:
        - OrganismTaxon
      remove:
        - .*;
        - _1
        - _6
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000996
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC10434204
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 474
    - annotation: q value
      method: column
      encoding: H
    - annotation: multiple testing correction method
      method: value
      encoding: FDR of 10 percent
    - annotation: relationship strength
      method: column
      encoding: E
    - annotation: assertion method
      method: value
      encoding: LME model
    - annotation: miscellaneous notes
      method: value
      encoding: Pairwise microbial correlation analysis in vaginal microbiota among the term-delivery cohort.
