template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11166937/bin/41467_2023_42013_MOESM4_ESM.csv
    local: ./DATALAKE/WU1.csv
    kind: text
    delimiter: ","
    reindex:
      - column: A
        comparison: ne
        comparator: root
      - column: A
        comparison: ne
        comparator: cellular organisms
      - column: A
        comparison: ne
        comparator: other sequences
      - column: A
        comparison: ne
        comparator: Bacteria
  statement:
    subject:
      method: value
      encoding: UMLS:C0242535
    predicate: affects
    object:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
      avoid:
        - OrganismTaxon
      remove:
        - \s*\(taxid[^)]*\)
        - ^root$
        - ^cellular organisms$
        - ^other sequences$
        - ^Bacteria$
        - sp.*
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000178
      - qualifier: object_aspect_qualifier
        method: value
        encoding: expression
  provenance:
    repo: PMC
    publication: PMC11166937
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 27
    - annotation: adjusted p value
      method: column
      encoding: F
    - annotation: multiple testing correction method
      method: value
      encoding: Bonferroni
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Seurat findmarker() likelihood ratio test
    - annotation: miscellaneous notes
      method: value
      encoding: A complete list of overall gene expression changes uG vs 1G (25 hours culture) in unstimulated peripheral blood mononuclear cells (PBMCs).
sections:
  - source:
      reindex:
        - column: C
          comparison: gt
          comparator: 0
    statement:
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: increased
  - source:
      reindex:
        - column: C
          comparison: lt
          comparator: 0
    statement:
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
          encoding: decreased
