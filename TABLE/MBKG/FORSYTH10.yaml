template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10945560/bin/DataSheet10.XLSX
    local: ./DATALAKE/FORSYTH10.xlsx
    kind: excel
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
        - uncultured
        - unc
      regex:
        - pattern: _
          replacement: ' '
    predicate: correlated_with
    object:
      method: column
      encoding: B
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
        - uncultured
        - unc
      regex:
        - pattern: _
          replacement: ' '
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
  provenance:
    repo: PMC
    publication: PMC10945560
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: p value
      method: column
      encoding: D
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: adjusted p value
      method: column
      encoding: E
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: SparCC

sections:
  - source:
      sheet: Inflam_SparCC_2-15_Mths
    annotations:
      - annotation: sample size
        method: value
        encoding: 11
      - annotation: miscellaneous notes
        method: value
        encoding: Mixed feature-feature SparCC correlations among inflammation-associated host genes and bacterial taxa for the 2-month versus 15-month mouse comparison.
  - source:
      sheet: Inflam_SparCC_2-25_Mths
    annotations:
      - annotation: sample size
        method: value
        encoding: 11
      - annotation: miscellaneous notes
        method: value
        encoding: Mixed feature-feature SparCC correlations among inflammation-associated host genes and bacterial taxa for the 2-month versus 25-month mouse comparison.
  - source:
      sheet: Inflam_SparCC_15-25_Mths
    annotations:
      - annotation: sample size
        method: value
        encoding: 12
      - annotation: miscellaneous notes
        method: value
        encoding: Mixed feature-feature SparCC correlations among inflammation-associated host genes and bacterial taxa for the 15-month versus 25-month mouse comparison.
