template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/4109533/bin/JCI75436sd16.xlsx
    local: ./DATALAKE/HABER16.xlsx
    kind: excel
    row_slice:
      - 5
      - auto
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: '.*;'
          replacement: ''
        - pattern: '^[a-z]__'
          replacement: ''
        - pattern: _
          replacement: ' '
    predicate: associated_with
    object:
      method: column
      encoding: A
      prioritize:
        - Gene
        - Disease
        - PhenotypicFeature
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC4109533
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: column
      encoding: D
    - annotation: p value
      method: column
      encoding: E
    - annotation: false discovery rate
      method: column
      encoding: F
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: regression coefficient
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: MaAsLin multivariate linear model
    - annotation: miscellaneous notes
      method: value
      encoding: MaAsLin associations between ileal microbial abundance and host variables from the pediatric RISK cohort, including gene expression and clinical phenotype variables, while controlling for age, gender, BMI, antibiotic exposure, and NOD2, FUT2, and ATG16L1 risk allele carriage.
