template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9431300/bin/spectrum.00013-22-s0005.xlsx
    local: ./DATALAKE/AVUTHU1.xlsx
    kind: excel
    sheet: signif_metab_microb_corre
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      regex:
        - pattern: ^(C\d+)_.*$
          replacement: KEGG.COMPOUND:$1
      prioritize:
        - SmallMolecule
        - ChemicalEntity
    object:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: _unclassified$
          replacement: _sp.
        - pattern: _sp_
          replacement: _sp._
        - pattern: _
          replacement: " "
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0005575
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001555 # GUT
  provenance:
    repo: PMC
    publication: PMC9431300
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 FEB 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migratassert (TC2-TC3)
  annotations:
    - annotation: sample size
      method: value
      encoding: 179
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: adjusted p value
      method: column
      encoding: E
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Spearman Correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Correlation analysis between 21 CRC microbial markers and 28 metabolites that were significantly different between CRC and healthy gut communities, 14 were enriched in CRC cases and 14 were enriched in healthy controls; 179 CRC samples were used in the correlation analysis, while the article text elsewhere reports 180 CRC samples.
sections:
  - source:
      reindex:
        - column: C
          comparison: gt
          comparator: 0
    statement:
      predicate: positively_correlated_with
  - source:
      reindex:
        - column: C
          comparison: lt
          comparator: 0
    statement:
      predicate: negatively_correlated_with
