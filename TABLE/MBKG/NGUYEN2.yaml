template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/8400760/bin/12866_2021_2282_MOESM2_ESM.xlsx
    local: ./DATALAKE/NGUYEN2.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
    predicate: correlated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      method: column
      encoding: B
  provenance:
    repo: PMC
    publication: PMC8400760
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: p value
      method: column
      encoding: D
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Pairs of microbes and targeted metabolites with significant spearman correlations at q-value < 0.05 with their correlation values for each time point.
sections:
  - source:
      sheet: sig_corr_tar_6W
    annotations:
      - annotation: sample size
        method: value
        encoding: 158
  - source:
      sheet: sig_corr_tar_12M
    annotations:
      - annotation: sample size
        method: value
        encoding: 262
