template:
  syntax: TC3
  source:
    url: https://ndownloader.figstatic.com/collections/7296079/versions/1
    local: ./DATALAKE/WU18.xlsx
    kind: excel
    sheet: Table S18
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      avoid:
        - Gene
      regex:
        - pattern: '_.+$'
          replacement: ''
    predicate: associated_with
    object:
      method: value
      encoding: age
      prioritize:
        - ClinicalAttribute
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC11224521
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 613
    - annotation: p value
      method: column
      encoding: I
    - annotation: relationship strength
      method: column
      encoding: E
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: reference group
      method: column
      encoding: C
    - annotation: comparison group
      method: column
      encoding: D
    - annotation: miscellaneous notes
      method: value
      encoding: Age-associated genera identified by MaAsLin with age-group contrasts in the healthy cohort.
