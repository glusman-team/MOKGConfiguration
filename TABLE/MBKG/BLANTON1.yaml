template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/4787260/bin/NIHMS762705-supplement-Supplementary_Tables_1-17.xlsx
    local: ./DATALAKE/BLANTON1.xlsx
    kind: excel
    sheet: Table S17.
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      remove:
        - NONE
        - ^correlation coefficient values$
        - ^\(c\) liver and gastrocnemius organic acids\.$
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0001371
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001988 # feces
  provenance:
    repo: PMC
    publication: PMC4787260
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 07 MAY 2026
  annotations:
    - annotation: sample size
      method: value
      encoding: 259
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Spearman rank correlations between levels of metabolites and the abundances of bacterial species in the fecal microbiota of mice colonized with the healthy versus the severely stunted/underweight infant microbiota. Sample size (n=259) refers to the iLiNS-DYAD-M human cohort used for validation, not the mouse experiment.
