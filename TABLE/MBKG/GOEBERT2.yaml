template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9212162/bin/pntd.0010491.s003.xlsx
    local: ./DATALAKE/GOEBERT2.xlsx
    kind: excel
    sheet: OTUs
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: "^.*g__"
          replacement: ""
        - pattern: "\\.s__"
          replacement: " "
        - pattern: "_OTU.*$"
          replacement: ""
        - pattern: \.
          replacement: " "
        - pattern: _
          replacement: " "
        - pattern: " OTU.*"
          replacement: ""
        - pattern: "Unclassified "
          replacement: ""
        - pattern: " unclassified"
          replacement: ""
    predicate: associated_with
    object:
      method: value
      encoding: Helminthiasis
      prioritize:
        - Disease
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0004664
  provenance:
    repo: PMC
    publication: PMC9212162
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 11 MAY 2026
  annotations:
    - annotation: sample size
      method: value
      encoding: 90
    - annotation: p value
      method: column
      encoding: C
    - annotation: false discovery rate
      method: column
      encoding: C
    - annotation: multiple testing correction method
      method: value
      encoding: False discovery rate
    - annotation: assertion method
      method: value
      encoding: ANOVA
    - annotation: miscellaneous notes
      method: value
      encoding: ANOVA outputs across four sample types (fecal infected, fecal uninfected, saliva infected, saliva uninfected) with FDR by infection category, tissue and infection adjusted p values, Tukey pairwise p values, and mean abundance for each group.
