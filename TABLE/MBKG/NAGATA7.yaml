template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9499989/bin/mmc2.xlsx
    local: ./DATALAKE/NAGATA7.xlsx
    kind: excel
    sheet: S7
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: H
      prioritize:
        - OrganismTaxon
      remove:
        - " species.*"
        - ' \(.*'
      regex:
        - pattern: '\['
          replacement: ""
        - pattern: '\]'
          replacement: ""
    predicate: associated_with
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000160
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0100096
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC9499989
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: multiple testing correction method
      method: value
      encoding: Unspecified
    - annotation: assertion method
      method: value
      encoding: Wilcoxon rank-sum test
    - annotation: miscellaneous notes
      method: value
      encoding: Gut microbial changes between COVID-19 complications

sections:
  - statement:
      object:
        method: value
        encoding: DOID:0081013
        prioritize:
          - Disease
    annotations:
      - annotation: sample size
        method: column
        encoding: L
      - annotation: p value
        method: column
        encoding: M
      - annotation: q value
        method: column
        encoding: N
      - annotation: relationship strength
        method: column
        encoding: J
  - statement:
      object:
        method: value
        encoding: MONDO:0005249
        prioritize:
          - Disease
    annotations:
      - annotation: sample size
        method: column
        encoding: Q
      - annotation: p value
        method: column
        encoding: R
      - annotation: q value
        method: column
        encoding: S
      - annotation: relationship strength
        method: column
        encoding: O
  - statement:
      object:
        method: value
        encoding: UNII:SDD8U8BB2G
        prioritize:
          - ChemicalEntity
      qualifiers:
        - qualifier: object_direction_qualifier
          method: value
