template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/8262870/bin/mbio.00145-21-sd002.xlsx
    local: ./DATALAKE/FUESS2.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    subject:
      prioritize:
        - OrganismTaxon
    predicate: correlated_with
    object:
      method: column
      encoding: B
      prioritize:
        - Protein
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:69293
  provenance:
    repo: PMC
    publication: PMC8262870
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 07 MAY 2026
  annotations:
    - annotation: relationship strength
      method: column
      encoding: D
    - annotation: assertion method
      method: value
      encoding: Kendall tau correlation analysis
    - annotation: protein names
      method: column
      encoding: C
    - annotation: protein accession
      method: column
      encoding: B
    - annotation: miscellaneous notes
      method: value
      encoding: List of stickleback transcripts significantly correlated with each of the top 15 most correlated microbial taxa.

