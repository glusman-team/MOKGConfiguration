template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11622590/bin/KVIR_A_2428843_SM0732.xlsx
    local: ./DATALAKE/LUO1.xlsx
    kind: excel
    sheet: Table S1B.
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      avoid:
        - Gene
        - ChemicalEntity
      regex:
        - pattern: _
          replacement: " "
    predicate: correlated_with
    object:
      method: column
      encoding: A
      prioritize:
        - Gene
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0010643
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001988
  provenance:
    repo: PMC
    publication: PMC11622590
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 20
    - annotation: multiple testing correction method
      method: value
      encoding: False Discovery Rate (FDR)
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Correlation/co-occurrence network between ARGs and potential bacterial hosts in stool samples from acute leukemia patients, using thresholds r > 0.8 and p < 0.001.
