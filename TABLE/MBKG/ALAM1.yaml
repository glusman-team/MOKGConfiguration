template:
  syntax: TC3
  status: alpha
  source:
    kind: excel
    local: ./DATALAKE/ALAM.xlsx
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11708054/bin/mbio.01679-24-s0006.xlsx
    row_slice:
      - 2
      - auto
    sheet: all correlations
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      avoid:
        - Gene
      remove:
        - "^NA$"
      regex:
        - pattern: ".*g__"
          replacement: ""
        - pattern: ";s__NA$"
          replacement: ""
        - pattern: ";s__sp[0-9]+(-[A-Za-z0-9]+)+$"
          replacement: ""
        - pattern: ";s__([A-Za-z][A-Za-z0-9]*)(-[A-Za-z0-9]+)+$"
          replacement: ""
        - pattern: ";s__([A-Za-z][A-Za-z0-9]*)$"
          replacement: " ${1}"
    predicate: correlated_with
    object:
      method: value
      encoding: CHEBI:41774
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001153
      - qualifier: object_context_qualifier
        method: value
        encoding: circulating blood 13C-tamoxifen AUC
  provenance:
    repo: PMC
    publication: PMC11708054
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 09 JAN 2025
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Manual Migration From TC2 to TC3 To Test Tablassert
  annotations:
    - annotation: sample size
      method: value
      encoding: 9
    - annotation: p value
      method: column
      encoding: C
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: B
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Correlation analysis between microbial composition and 13C-tamoxifen abundance after FDR correction
    - annotation: FDR result
      method: value
      encoding: not significant
