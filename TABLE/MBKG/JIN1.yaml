template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10269647/bin/spectrum.03662-22-s0002.xlsx
    local: ./DATALAKE/JIN1.xlsx
    kind: excel
    sheet: Supplementary Table 3
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: _
          replacement: " "
    predicate: associated_with
    object:
      method: value
      encoding: MONDO:0008383
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001088
      - qualifier: subject_aspect_qualifier
        method: value
        encoding: abundance
      - qualifier: subject_direction_qualifier
        method: column
        encoding: C
        regex:
          - pattern: RA
            replacement: increased
          - pattern: HC
            replacement: decreased
  provenance:
    repo: PMC
    publication: PMC10269647
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: case sample size
      method: value
      encoding: 39
    - annotation: control sample size
      method: value
      encoding: 37
    - annotation: p value
      method: column
      encoding: D
    - annotation: multiple testing correction method
      method: value
      encoding: Unspecified
    - annotation: fold change
      method: column
      encoding: B
    - annotation: assertion method
      method: value
      encoding: case-control differential abundance analysis
    - annotation: miscellaneous notes
      method: value
      encoding: Differential abundance analysis of bacterial genera in the human urinary microbiome comparing rheumatoid arthritis patients with healthy controls, based on 16S rRNA gene sequencing and quantitative PCR.
