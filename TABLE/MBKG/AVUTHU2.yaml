template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9431300/bin/spectrum.00013-22-s0003.xlsx
    local: ./DATALAKE/AVUTHU2.xlsx
    kind: excel
    sheet: Rel_abundance_top20species
    row_slice:
      - 62
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
    predicate: associated_with
    object:
      method: column
      encoding: C
      avoid:
        - OrganismTaxon
      regex:
        - pattern: Washington,DC
          replacement: United States of America
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0005575
  provenance:
    repo: PMC
    publication: PMC9431300
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 FEB 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Migratassert (TC2-TC3)
  annotations:
    - annotation: sample size
      method: value
      encoding: 28
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: B
    - annotation: assertion method
      method: value
      encoding: Relative abundance
    - annotation: miscellaneous notes
      method: value
      encoding: Top 20 abundance species from each dataset
