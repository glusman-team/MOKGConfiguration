template:
  syntax: TC3
  source:
    url: https://static-content.springer.com/esm/art%3A10.1038%2Fs43856-024-00583-y/MediaObjects/43856_2024_583_MOESM9_ESM.xlsx
    local: ./DATALAKE/MILLER7.xlsx
    kind: excel
    sheet: Supplementary Data 3
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        # Replaced look-ahead with a capture group
        - pattern: '\bsp ([A-Z0-9])'
          replacement: 'sp. \1'
        - pattern: '\b(CAG) (\d+)\b'
          replacement: '\1:\2'
        - pattern: '\b(T\d+) (\d+)\b'
          replacement: '\1-\2'
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      method: value
      encoding: study cohort
      prioritize:
        - Cohort
        - StudyPopulation
  provenance:
    repo: PMC
    publication: PMC11329762
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: p value
      method: column
      encoding: D
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: LDA score
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Linear discriminant analysis
    - annotation: miscellaneous notes
      method: value
      encoding: List of bacterial species that differed significantly between aged-care residents and non-elderly younger adults
sections:
  - source:
      row_slice:
        - 2
        - 66
    statement:
      object:
        encoding: aged-care resident cohort
    annotations:
      - annotation: sample size
        method: value
        encoding: 123
  - source:
      row_slice:
        - 67
        - 128
    statement:
      object:
        encoding: non-elderly adult cohort
    annotations:
      - annotation: sample size
        method: value
        encoding: 20
