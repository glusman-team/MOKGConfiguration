template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/8980904/bin/PHY2-10-e15254-s002.xlsx
    local: ./DATALAKE/BOMBIN1.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: C
      taxon: 9606
      remove:
        - .*Plasma_
        - .*Stool_
        - ' \(.*'
        - ' \[.*'
        - \.*
        - uncharacterized protein
        - ;.*
        - /.*
      explode_by: ','
    predicate: correlated_with
    object:
      method: column
      encoding: F
      taxon: 9606
      remove:
        - .*Plasma_
        - .*Stool_
        - ' \(.*'
        - ' \[.*'
        - \.*
        - uncharacterized protein
        - ;.*
        - /.*
      explode_by: ','
    qualifiers:
      - qualifier: disease_context_qualifier
        method: value
        encoding: MONDO:0011122
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UMLS:C1956108 # MICROBIOM
  provenance:
    repo: PMC
    publication: PMC8980904
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 219
    - annotation: p value
      method: column
      encoding: G
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: assertion method
      method: value
      encoding: Spearman correlation

