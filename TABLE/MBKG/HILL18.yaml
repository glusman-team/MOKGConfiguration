template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/5240274/bin/40168_2016_213_MOESM1_ESM.xlsx
    local: ./DATALAKE/HILL18.xlsx
    kind: excel
    sheet: Supplementary Table 18
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      remove:
        - " - .*"
    predicate: correlated_with
    object:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: "^Escherichia/Shigella$"
          replacement: "Escherichia"
        - pattern: "^Clostridium sensu stricto$"
          replacement: "Clostridium"
      remove:
        - ".* - "
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0001988
  provenance:
    repo: PMC
    publication: PMC5240274
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 11 MAY 2026
  annotations:
    - annotation: sample size
      method: value
      encoding: 192
    - annotation: p value
      method: column
      encoding: C
    - annotation: adjusted p value
      method: column
      encoding: D
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: B
    - annotation: assertion method
      method: value
      encoding: Pearson correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Significant negative correlations of abundances of genera pairs. Correlations were tested with Pearson correlation. The false discovery rate was adjusted for with Benjamini-Hochberg adjustment.
