template:
  syntax: TC3
  status: primetime
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/7253361/bin/mSystems.00055-20-st002.xlsx
    local: ./DATALAKE/YUAN2.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      avoid:
        - Gene
      regex:
        - pattern: _
          replacement: " "
    predicate: positively_correlated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9555
    object:
      method: column
      encoding: B
      prioritize:
        - SmallMolecule
        - ChemicalEntity
  provenance:
    repo: PMC
    publication: PMC7253361
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 10
    - annotation: p value
      method: column
      encoding: D
    - annotation: q value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Unspecified
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
sections:
  - source:
      sheet: Small Intestine
      reindex:
        - column: C
          comparison: gt
          comparator: 0
    statement:
      predicate: positively_correlated_with
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: UBERON:0002108
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Spearman's correlation results for positive microbiota-metabolome interactions in the small intestine
  - source:
      sheet: Small Intestine
      reindex:
        - column: C
          comparison: lt
          comparator: 0
    statement:
      predicate: negatively_correlated_with
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: UBERON:0002108
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Spearman's correlation results for negative microbiota-metabolome interactions in the small intestine
  - source:
      sheet: Large Intestine
      reindex:
        - column: C
          comparison: gt
          comparator: 0
    statement:
      predicate: positively_correlated_with
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: UBERON:0000059
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Spearman's correlation results for positive microbiota-metabolome interactions in the large intestine
  - source:
      sheet: Large Intestine
      reindex:
        - column: C
          comparison: lt
          comparator: 0
    statement:
      predicate: negatively_correlated_with
      qualifiers:
        - qualifier: anatomical_context_qualifier
          method: value
          encoding: UBERON:0000059
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Spearman's correlation results for negative microbiota-metabolome interactions in the large intestine
