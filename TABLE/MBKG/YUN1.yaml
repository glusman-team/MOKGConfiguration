template:
  syntax: TC3
  source:
    local: ./DATALAKE/YUN1.xlsx
    kind: excel
    sheet: 시트1
    row_slice:
      - 5
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      remove:
        - .*__
    predicate: correlated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      encoding: Nonalcoholic Fatty Liver Disease
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC6417675
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 298
    - annotation: p value
      method: column
      encoding: F
    - annotation: multiple testing correction method
      method: value
      encoding: Bonferroni
    - annotation: relationship strength
      method: column
      encoding: D
    - annotation: assertion method
      method: value
      encoding: Zero-inflated Gaussian mixture model
sections:
  - source:
      url: https://pmc.ncbi.nlm.nih.gov/articles/instance/6417675/bin/pone.0213692.s002.xlsx
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Significant taxa in blood microbiota related with NAFLD groups. Both unadjusted and adjusted P-values are provided.
  - source:
      url: https://pmc.ncbi.nlm.nih.gov/articles/instance/6417675/bin/pone.0213692.s001.xlsx
    annotations:
      - annotation: miscellaneous notes
        method: value
        encoding: Significant taxa in fecal microbiota related with NAFLD groups. Both unadjusted and adjusted P-values are provided.
