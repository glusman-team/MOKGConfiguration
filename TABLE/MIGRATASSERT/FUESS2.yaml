template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/8262870/bin/mbio.00145-21-sd002.xlsx
    local: ./DATALAKE/FUESS2.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    subject:
      prioritize:
        - OrganismTaxon
    predicate: correlated_with
    object:
      method: column
      encoding: C
      taxon: 69293
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:69293
  provenance:
    repo: PMC
    publication: PMC8262870
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 1929
    - annotation: relationship strength
      method: column
      encoding: D
    - annotation: assertion method
      method: value
      encoding: Signed network using bicor analyses
    - annotation: miscellaneous notes
      method: value
      encoding: List of transcripts which were significantly correlated with each of the top 15 most correlated microbial families.
