template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/7562722/bin/41467_2020_18871_MOESM4_ESM.xlsx
    local: ./DATALAKE/MANOR2.xlsx
    kind: excel
    sheet: Supplementary Data 2
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: value
      encoding: Shannon Alpha Diversity
    predicate: associated_with
    object:
      method: column
      encoding: A
      avoid:
        - OrganismTaxon
      remove:
        - \(.*
        - s$
        - ^[^a-zA-Z]*
        - \s+$
      regex:
        - pattern: Diastolic
          replacement: Diastolic blood pressure
        - pattern: Systolic BP
          replacement: Systolic blood pressure
  provenance:
    repo: PMC
    publication: PMC7562722
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 3064
    - annotation: p value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: C
      transformations:
        - function: copysign
          arguments:
            - 
            - -1
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Associations between host/lifestyle factors and microbiome diversity. Associations were tested by fitting linear regression models of Shannon diversity on each analyte, adjusting for age, sex, race of the individual, the season in which the microbiome sample was taken, and the microbiome sequencing vendor. Only factors with multiple hypotheses correction FDR p-value < 0.05 are shown.
