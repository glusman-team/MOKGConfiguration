template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/6555748/bin/12931_2019_1085_MOESM2_ESM.xlsx
    local: ./DATALAKE/WANG2.xlsx
    kind: excel
    row_slice:
      - 2
      - auto
  statement:
    predicate: associated_with
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000160
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC6555748
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 59
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
  sections:
  - source:
      sheet: A. Pathways Exac vs Stable
    statement:
      subject:
        method: value
        encoding: chronic obstructive pulmonary disease
      object:
        method: column
        encoding: A
        remove:
          - .*_
          - \([^()]*\)
      annotations:
      - annotation: p value
        method: column
        encoding: F
      - annotation: relationship strength
        method: column
        encoding: C
      - annotation: miscellaneous notes
        method: value
        encoding: MetaCore pathways significantly enriched for differential expressed genes (DEGs) between stable and exacerbations (FDR P <= 0.01)
  - source:
      sheet: B. Proteins COPD ES vs CS
    statement:
      subject:
        method: column
        encoding: B
        prioritize:
          - Protein
      object:
        method: value
        encoding: smoking status
      annotations:
      - annotation: p value
        method: column
        encoding: D
      - annotation: relationship strength
        method: column
        encoding: C
      - annotation: assertion method
        method: value
        encoding: Wilcoxon signed-rank test
      - annotation: miscellaneous notes
        method: value
        encoding: Significantly differentially expressed proteins between sputum samples of COPD ex-smokers and current smokers (Wilcoxon, FDR P <= 0.05)
