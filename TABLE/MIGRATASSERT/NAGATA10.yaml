template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/9499989/bin/mmc2.xlsx
    local: ./DATALAKE/NAGATA10.xlsx
    kind: excel
    sheet: S10
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      remove:
        - '.*; '
        - ' \[.*'
        - uncharacterized protein
        - ^.*?\]
        - ' \(.*'
    predicate: associated_with
    object:
      method: value
      encoding: COVID-19
      prioritize:
        - Disease
  provenance:
    repo: PMC
    publication: PMC9499989
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 224
    - annotation: p value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Unspecified
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Wilcoxon rank-sum test
    - annotation: miscellaneous notes
      method: value
      encoding: Gut microbial functional genes based on KEGG orthology between COVID-19 and controls
