template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/6555748/bin/12931_2019_1085_MOESM5_ESM.xlsx
    local: ./DATALAKE/WANG5.xlsx
    kind: excel
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    object:
      prioritize:
        - OrganismTaxon
    qualifiers:
      - qualifier: anatomical_context_qualifier
        method: value
        encoding: UBERON:0000160
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC6555748
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 59
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Cross associations among microbiome (9 microbiome genera and Shannon diversity), host transcriptome (9 tPCs) and proteome (8 pPCs) data both across all samples and within stable samples in a multivariate analysis. FDR P-values are indicated in table.
