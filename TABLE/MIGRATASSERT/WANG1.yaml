template:
  syntax: TC3
  source:
    url: https://static-content.springer.com/esm/art%3A10.1038%2Fs41591-024-03038-y/MediaObjects/41591_2024_3038_MOESM2_ESM.xlsx
    local: ./DATALAKE/WANG1.xlsx
    kind: excel
    sheet: STable7
    row_slice:
      - 5
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: _
          replacement: ' '
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      method: value
  provenance:
    repo: PMID
    publication: '38844795'
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 2929
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Partial Spearman's correlations between species abundances and metabolic variables.
