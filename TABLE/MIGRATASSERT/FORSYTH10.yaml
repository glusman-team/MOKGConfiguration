template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10945560/bin/DataSheet10.XLSX
    local: ./DATALAKE/FORSYTH10.xlsx
    kind: excel
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 10090
      prioritize:
        - OrganismTaxon
        - Gene
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
      regex:
        - pattern: _
          replacement: ' '
    predicate: correlated_with
    object:
      method: column
      encoding: B
      taxon: 10090
      prioritize:
        - OrganismTaxon
        - Gene
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
      regex:
        - pattern: _
          replacement: ' '
  provenance:
    repo: PMC
    publication: PMC10945560
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: p value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: SparCC
sections:
  - source:
      sheet: Inflam_SparCC_2-15_Mths
    annotations:
      - annotation: sample size
        encoding: 11
      - annotation: miscellaneous notes
        method: value
        encoding: Inflammation Genes and Bacterial Genera Correlation Outcomes between 2 Month- and 15-Month Old Mice Groups
  - source:
      sheet: Inflam_SparCC_2-25_Mths
    annotations:
      - annotation: sample size
        encoding: 11
      - annotation: miscellaneous notes
        method: value
        encoding: Inflammation Genes and Bacterial Genera Correlation Outcomes between 2 Month- and 25-Month Old Mice Groups
  - source:
      sheet: Inflam_SparCC_15-25_Mths
    annotations:
      - annotation: sample size
        encoding: 12
      - annotation: miscellaneous notes
        method: value
        encoding: Inflammation Genes and Bacterial Genera Correlation Outcomes between 15-Month- and 25-Month Old Mice Groups
