template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10945560/bin/DataSheet10.XLSX
    local: ./DATALAKE/FORSYTH10.xlsx
    kind: excel
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: A
      taxon: 10090
      prioritize:
        - OrganismTaxon
        - Gene
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
      regex:
        - pattern: _
          replacement: ' '
    predicate: correlated_with
    object:
      method: column
      encoding: B
      taxon: 10090
      prioritize:
        - OrganismTaxon
        - Gene
      remove:
        - _Gn
        - Gn
        - _Gp
        - Gp
      regex:
        - pattern: _
          replacement: ' '
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
  provenance:
    repo: PMC
    publication: PMC10945560
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: p value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: SparCC
