template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10124008/bin/40168_2023_1506_MOESM13_ESM.xlsx
    local: ./DATALAKE/HAO1.xlsx
    kind: excel
    sheet: vip value
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      regex:
        - pattern: ^.*?_
          replacement: ''
        - pattern: _
          replacement: ' '
        - pattern: '-'
          replacement: ' '
        - pattern: ^\s+
          replacement: ''
        - pattern: \s+$
          replacement: ''
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC10124008
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 8
    - annotation: assertion method
      method: value
      encoding: PLS regression
    - annotation: miscellaneous notes
      method: value
      encoding: The key species with VIP score >= 1 in more than 50% of the psychological factors
