template:
  syntax: TC3
  source:
    url: https://static-content.springer.com/esm/art%3A10.1038%2Fs41467-024-52097-9/MediaObjects/41467_2024_52097_MOESM9_ESM.xlsx
    local: ./DATALAKE/RAVIK9.xlsx
    kind: excel
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
    predicate: associated_with
  provenance:
    repo: PMC
    publication: PMC11377447
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 234
    - annotation: p value
      method: column
      encoding: E
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: relationship strength
      method: column
      encoding: C
    - annotation: assertion method
      method: value
      encoding: Generalized linear model
    - annotation: miscellaneous notes
      method: value
      encoding: Age corrected species-level associations between taxa and clinical parameters + frailty measures.
