template:
  syntax: TC3
  source:
    url: https://static-content.springer.com/esm/art%3A10.1038%2Fs41564-024-01870-z/MediaObjects/41564_2024_1870_MOESM4_ESM.xlsx
    local: ./DATALAKE/FACKLE13.xlsx
    kind: excel
    sheet: Supplementary Table 13
    row_slice:
      - 2
      - auto
  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - OrganismTaxon
      remove:
        - \..*
        - s__
        - ' unclassified.*'
      regex:
        - pattern: _
          replacement: ' '
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      method: column
      encoding: H
      avoid:
        - OrganismTaxon
      regex:
        - pattern: _
          replacement: ' '
        - pattern: veg
          replacement: vegetables
  provenance:
    repo: PMC
    publication: PMC11726441
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 21561
    - annotation: p value
      method: column
      encoding: G
    - annotation: multiple testing correction method
      method: value
      encoding: Benjamini Hochberg
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Significant (FDR < 0.1), meta-analysed Spearman correlations between the arcsine-transformed relative abundances of each SGB within each individual and amount of meat (red and white), dairy products, fruits and vegetables consumed. pval.random, P value for test of overall effect of random-effects model. TE.random, estimated overall effect of random-effects model. seTE.random, standard error of fixed effect model. lower.random and upper.random, lower and upper confidence interval limits of random-effects model.
