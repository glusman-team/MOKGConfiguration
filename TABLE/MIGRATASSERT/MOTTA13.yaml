template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/11792502/bin/spectrum.01368-24-s0002.xlsx
    local: ./DATALAKE/MOTTA13.xlsx
    kind: excel
    sheet: Table S13
    row_slice:
      - 3
      - auto
  statement:
    subject:
      method: column
      encoding: B
      taxon: 9606
      prioritize:
        - Gene
    predicate: associated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
    object:
      encoding: extracellular vesicles
  provenance:
    repo: PMC
    publication: PMC11792502
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 12
    - annotation: p value
      method: column
      encoding: G
    - annotation: relationship strength
      method: column
      encoding: D
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Table S13. Total number of DEGs with significant (padj ≤ 0.05) expression differences between conditions MEVs treated vs Control (non-treated). Relationship Strengh a log2FoldChange.
