template:
  syntax: TC3
  source:
    url: https://pmc.ncbi.nlm.nih.gov/articles/instance/10434204/bin/spectrum.03429-22-s0001.xlsx
    local: ./DATALAKE/ROMERO2.xlsx
    kind: excel
    sheet: SupplementalTable_2
    row_slice:
      - 5
      - auto
    reindex:
      - column: N
        comparison: ne
        comparator: 'FALSE'
  statement:
    subject:
      method: column
      encoding: I
      prioritize:
        - OrganismTaxon
      remove:
        - NA*
    predicate: associated_with
    object:
      method: value
      encoding: gestational age
  provenance:
    repo: PMC
    publication: PMC10434204
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 474
    - annotation: p value
      method: column
      encoding: M
    - annotation: multiple testing correction method
      method: value
      encoding: FDR of 10 percent
    - annotation: relationship strength
      method: column
      encoding: K
    - annotation: assertion method
      method: value
      encoding: LME model
    - annotation: miscellaneous notes
      method: value
      encoding: Comparison of analyses evaluating the relationship between gestational age and the vaginal microbiota using absolute abundance analysis (Analysis of Composition of Microbiomes; ANCOM) and relative abundance analysis (Linear mixed-effects models; LME).
