template:
  syntax: TC3
  source:
    url: https://ndownloader.figstatic.com/collections/7296079/versions/1
    local: ./DATALAKE/WU19.xlsx
    kind: excel
    sheet: Table S19
    row_slice:
      - 4
      - auto
  statement:
    subject:
      method: column
      encoding: B
      prioritize:
        - OrganismTaxon
      remove:
        - ^.*?\.
        - \..*$
        - _.+$
        - '7'
        - Family
    predicate: associated_with
    object:
      encoding: Females
    qualifiers:
      - qualifier: sex_qualifier
        method: value
        encoding: UMLS:C0086287
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:9606
      - qualifier: population_context_qualifier
        method: value
        encoding: NCBITaxon:9606
  provenance:
    repo: PMC
    publication: PMC11224521
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 17 FEB 2026
        organizations:
          - Institute for Systems Biology
  annotations:
    - annotation: sample size
      method: value
      encoding: 613
    - annotation: p value
      method: column
      encoding: I
    - annotation: relationship strength
      method: column
      encoding: E
    - annotation: assertion method
      method: value
      encoding: Spearman correlation
    - annotation: miscellaneous notes
      method: value
      encoding: Age-associated genus identified by MaAsLin in each age group.
