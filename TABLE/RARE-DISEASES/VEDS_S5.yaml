template:
  syntax: TC3
  status: alpha
  
  source:
    kind: text
    local: ./source/PMC13134318.1/supplement_table_S5.csv
    url: https://static-content.springer.com/esm/art%3A10.1186%2Fs13023-026-04327-0/MediaObjects/13023_2026_4327_MOESM1_ESM.pdf
    delimiter: "\t"
    row_slice: [1, auto]
  
  statement:
    subject:
      method: column
      encoding: A
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize: [Cohort]
  
  provenance:
    repo: PMC
    publication: PMC13134318
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
        comment: Config for diagnostic classification comparison table S5
  
  annotations:
    - annotation: patient_id
      method: column
      encoding: A
      fill: forward
    - annotation: year_first_visit
      method: column
      encoding: C
    - annotation: diagnostic_criteria_2017
      method: column
      encoding: D
    - annotation: major_clinical_findings
      method: column
      encoding: E
    - annotation: other_clinical_findings
      method: column
      encoding: F
    - annotation: hemoptysis
      method: column
      encoding: G
      regex:
        - pattern: "✓"
          replacement: "present"
        - pattern: "✗"
          replacement: "absent"
    - annotation: hemoptysis_imaging_features
      method: column
      encoding: H
      regex:
        - pattern: "✓"
          replacement: "present"
        - pattern: "✗"
          replacement: "absent"
    - annotation: other_respiratory_manifestations
      method: column
      encoding: I
      regex:
        - pattern: "✓"
          replacement: "present"
        - pattern: "✗"
          replacement: "absent"
    - annotation: diagnosis_duration_years
      method: column
      encoding: J
    - annotation: misdiagnosis
      method: column
      encoding: K
      regex:
        - pattern: "✓"
          replacement: "yes"
        - pattern: "✗"
          replacement: "no"
    - annotation: invasive_procedures
      method: column
      encoding: L
      regex:
        - pattern: "✓"
          replacement: "present"
        - pattern: "✗"
          replacement: "absent"
    - annotation: nucleotide_change
      method: column
      encoding: M
      fill: forward
    - annotation: miscellaneous_notes
      method: value
      encoding: "Comparison between 2017 international Ehlers-Danlos syndrome classification and empirical summary; checkmarks (✓) indicate presence, crosses (✗) indicate absence"

sections:
  - statement:
      predicate: manifestation_of
      object:
        method: column
        encoding: G
        prioritize: [PhenotypicFeature]
  - statement:
      predicate: associated_with
      object:
        method: column
        encoding: H
        prioritize: [PhenotypicFeature]
  - statement:
      predicate: has_sequence_variant
      object:
        method: column
        encoding: M
        prioritize: [SequenceVariant]