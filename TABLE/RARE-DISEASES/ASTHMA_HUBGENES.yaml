template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./.ledger/pediatric-acute-care-multi-omics/data/PMC13140575/raw/source/PMC13140575.1/JCMM-30-e71102-s004.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13140575/
    sheet: Table S14
    row_slice: [1, auto]
    reindex:
      - column: G
        comparator: Hub
        comparison: eq

  statement:
    subject:
      method: column
      encoding: F
      taxon: 9606
      prioritize: [Gene]
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0004979
      prioritize: [Disease]

  provenance:
    repo: PMC
    publication: PMC13140575
    contributors:
      - kind: curation
        name: Tablassist Pipeline
        date: 06 MAY 2026

  annotations:
    - annotation: Betweenness
      method: column
      encoding: A
    - annotation: Closeness
      method: column
      encoding: B
    - annotation: Degree
      method: column
      encoding: C
