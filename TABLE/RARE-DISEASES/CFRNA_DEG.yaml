template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./.ledger/pediatric-acute-care-multi-omics/data/PMC13125234/source/43856_2026_1489_MOESM4_ESM.csv
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13125234/
    row_slice: [1, "auto"]
    delimiter: ","

  statement:
    subject:
      method: column
      encoding: A
      prioritize: [Gene]
      taxon: 9606
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: MONDO:0012727
      prioritize: [Disease]

  provenance:
    repo: PMC
    publication: PMC13125234
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: cfRNA DEGs from KD vs MIS-C comparison in pediatric multi-omics study
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
    - annotation: log2_fold_change
      method: column
      encoding: C
    - annotation: adjusted_p_value
      method: column
      encoding: G
    - annotation: comparison
      method: value
      encoding: "KD vs MIS-C"
