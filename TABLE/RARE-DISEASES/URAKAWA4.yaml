template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./DATALAKE/gnas_php1b.csv
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13104445/
    delimiter: ","
    row_slice:
      - 1
      - auto

  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
    predicate: gene_associated_with_condition
    object:
      method: column
      encoding: B
      prioritize:
        - Disease

  provenance:
    repo: PMC
    publication: PMC13104445
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
