template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/IUB-78-0-s001.xlsx
    url: https://journals.iucr.org/iucr/publications/iub/iub78/iub78-supplementary/IUB-78-0-s001.xlsx
    sheet: "raw_data_assigned"
    row_slice: [1, auto]  # Skip header row

  statement:
    subject:
      method: column
      encoding: A  # Experimental condition column
      prioritize: [PhenotypicFeature]
    predicate: associated_with
    object:
      method: column
      encoding: B  # First metabolite column
      prioritize: [ChemicalEntity]

  provenance:
    repo: PMC
    publication: "13071126"
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: Metabolomics data from PMM2-CDG patient study

  annotations:
    - annotation: measurement_type
      method: value
      encoding: "NMR metabolite intensity"

    - annotation: normalization
      method: value
      encoding: "normalized to total spectrum area"

    - annotation: experimental_condition
      method: column
      encoding: A
