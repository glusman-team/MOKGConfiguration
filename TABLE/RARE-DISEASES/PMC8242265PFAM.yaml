template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: .ledger/rare-neuromuscular-myopathy-omics/data/PMC8242265/source/PMC8242265/mmc17.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8242265/
    sheet: Table S11
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prefix: "PFAM:"
      prioritize:
        - ProteinDomain
    predicate: has_member
    object:
      method: column
      encoding: G
      explode_by: ","
      prioritize:
        - Gene
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: "NCBITaxon:9606"

  provenance:
    repo: PMC
    publication: PMC8242265
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
    - annotation: FDR
      method: column
      encoding: E
