        method: value
        encoding: "NCBITaxon:10090"

  provenance:
    repo: PMC
    publication: PMC7710136
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

