template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/pnas.2505884122.sd01.xlsx
    url: https://www.pnas.org/doi/suppl/10.1073/pnas.2505884122/suppl_file/pnas.2505884122.sd01.xlsx
    sheet: Sheet1
    row_slice: [0, auto]

  statement:
    subject:
      method: column
      encoding: M
      taxon: 9606
      prioritize: [Gene]
    predicate: gene_associated_with_condition
    object:
      method: value
      encoding: UMLS:C5816793
      prioritize: [Disease]

  annotations:
    - annotation: Consequence
      method: column
      encoding: R
    - annotation: IMPACT
      method: column
      encoding: Q
    - annotation: CADD PHRED
      method: column
      encoding: Y
    - annotation: CADD RAW
      method: column
      encoding: Z
    - annotation: MAX AF
      method: column
      encoding: U
    - annotation: SIFT
      method: column
      encoding: W
    - annotation: PolyPhen
      method: column
      encoding: X

  provenance:
    repo: PMC
    publication: PMC12403135
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
