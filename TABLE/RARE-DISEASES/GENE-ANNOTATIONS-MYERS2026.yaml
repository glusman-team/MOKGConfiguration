template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/DNEU-86-0-s006.xlsx
    url: https://pubmed.ncbi.nlm.nih.gov/13133546/
    sheet: "Differentially Expressed"
    row_slice: [1, auto]

  provenance:
    repo: PMC
    publication: "PMC13133546"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

sections:
  - statement:
      subject:
        method: column
        encoding: C  # gene symbol column
        prioritize: [Gene]
        fill: forward
      predicate: associated_with
      object:
        method: column
        encoding: G  # GO term name column
        prioritize: [BiologicalProcess]
        fill: forward
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
    annotations:
      - annotation: gene name
        method: column
        encoding: D  # gene name column
        fill: forward
      - annotation: HGNC ID
        method: column
        encoding: B  # gene hgnc_id column
        fill: forward

  - statement:
      subject:
        method: column
        encoding: C  # gene symbol column
        prioritize: [Gene]
        fill: forward
      predicate: associated_with
      object:
        method: column
        encoding: G  # GO term name column
        prioritize: [CellularComponent]
        fill: forward
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
    annotations:
      - annotation: gene name
        method: column
        encoding: D  # gene name column
        fill: forward
      - annotation: HGNC ID
        method: column
        encoding: B  # gene hgnc_id column
        fill: forward