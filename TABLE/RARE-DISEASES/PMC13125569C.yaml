      method: value
      encoding: Lox
      taxon: 10116
      prioritize: [Gene]
    predicate: related_to
    object:
      method: value
      encoding: condition

  provenance:
    repo: PMC
    publication: PMC13125569
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
        comment: Created from merged-header rat mechano-culture sheet

