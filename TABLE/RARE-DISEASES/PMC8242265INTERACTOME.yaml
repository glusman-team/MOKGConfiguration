template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/mmc13.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8242265/
    sheet: Table S7
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: A
      regex:
        - pattern: _[A-Z0-9]+$
          replacement: ""
      prioritize:
        - Gene
    predicate: correlated_with
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: "NCBITaxon:9606"

  provenance:
    repo: PMC
    publication: PMC8242265
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

sections:
  - statement:
      object:
        method: value
        encoding: "UMLS:C2986479"
        prioritize:
          - InformationContentEntity
    annotations:
      - annotation: HC MB 1 count
        method: column
        encoding: B
      - annotation: HC MB 2 count
        method: column
        encoding: C
      - annotation: HC MB 3 count
        method: column
        encoding: D

  - statement:
