        encoding: "Mecp2 knockout rat model"
      
      - qualifier: treatment_context_qualifier
        method: value
        encoding: "wild-type control"
  
  annotations:
    - annotation: fold_change
      method: column
      encoding: B
      transform:
        - name: float
          arguments: []
    
    - annotation: p_adj
      method: column
      encoding: C
      transform:
        - name: float
          arguments: []

