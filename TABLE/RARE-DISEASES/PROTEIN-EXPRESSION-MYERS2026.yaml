template:
  syntax: TC3
  status: alpha
  
  source:
    kind: excel
    local: ./DATALAKE/DNEU-86-0-s003.xlsx
    url: http://placeholder
    row_slice: [1, auto]
  
  provenance:
    repo: PMC
    publication: "13133546"
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
          - CalPoly SLO
        comment: Created for protein expression analysis from rett syndrome Mecp2 study

sections:
  # AllData sheet - Mecp2 vs WT comparison
  - source:
      sheet: AllData
    
    statement:
      subject:
        method: column
        encoding: A
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: associated_with
      
      object:
        method: value
        encoding: "Mecp2 knockout phenotype"
        prioritize: [DiseaseOrPhenotypicFeature]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "Mecp2 knockout vs wild-type"
    
    annotations:
      - annotation: fold_change
        method: column
        encoding: B
      - annotation: p_adj
        method: column
        encoding: C

  # AllData sheet - VNS treatment in Mecp2 rats
  - source:
      sheet: AllData
    
    statement:
      subject:
        method: column
        encoding: D
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: affects_response_to
      
      object:
        method: value
        encoding: "VNS treatment"
        prioritize: [Treatment]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "VNS treatment in Mecp2 rats"
    
    annotations:
      - annotation: fold_change
        method: column
        encoding: E
      - annotation: p_adj
        method: column
        encoding: F

  # AllData sheet - VNS-treated Mecp2 vs WT (rescue effect)
  - source:
      sheet: AllData
    
    statement:
      subject:
        method: column
        encoding: G
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: ameliorates_condition
      
      object:
        method: value
        encoding: "Rett syndrome phenotype"
        prioritize: [DiseaseOrPhenotypicFeature]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "VNS treatment rescue effect"
    
    annotations:
      - annotation: fold_change
        method: column
        encoding: H
      - annotation: p_adj
        method: column
        encoding: I

  # DiffExp sheet - Mecp2 vs WT comparison (differentially expressed)
  - source:
      sheet: DiffExp
    
    statement:
      subject:
        method: column
        encoding: A
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: associated_with
      
      object:
        method: value
        encoding: "Mecp2 knockout phenotype"
        prioritize: [DiseaseOrPhenotypicFeature]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "Mecp2 knockout vs wild-type differentially expressed"
        
        - qualifier: severity_qualifier
          method: value
          encoding: "differentially expressed"
    
    annotations:
      - annotation: fold_change
        method: column
        encoding: B
      - annotation: p_adj
        method: column
        encoding: C

  # DiffExp sheet - VNS treatment in Mecp2 rats (differentially expressed)
  - source:
      sheet: DiffExp
    
    statement:
      subject:
        method: column
        encoding: D
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: affects_response_to
      
      object:
        method: value
        encoding: "VNS treatment"
        prioritize: [Treatment]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "VNS treatment in Mecp2 rats differentially expressed"
        
        - qualifier: severity_qualifier
          method: value
          encoding: "differentially expressed"
    
    annotations:
      - annotation: fold_change
        method: column
        encoding: E
      - annotation: p_adj
        method: column
        encoding: F

  # DiffExp sheet - VNS-treated Mecp2 vs WT (rescue effect, differentially expressed)
  - source:
      sheet: DiffExp
    
    statement:
      subject:
        method: column
        encoding: G
        prioritize: [Protein]
        regex:
          - pattern: "'"
            replacement: ""
        fill: forward
      
      predicate: ameliorates_condition
      
      object:
        method: value
        encoding: "Rett syndrome phenotype"
        prioritize: [DiseaseOrPhenotypicFeature]
      
      qualifiers:
        - qualifier: species_context_qualifier
          method: value
          encoding: NCBITaxon:10090
        
        - qualifier: context_qualifier
          method: value
          encoding: "VNS treatment rescue effect differentially expressed"
        
        - qualifier: severity_qualifier
          method: value
          encoding: "differentially expressed"
    
