template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./.ledger/imprinting-disorder-methylomics/data/PMC12150451/source/source/PMC12150451.1/13148_2025_1907_MOESM2_ESM.xlsx
    url: https://static-content.springer.com/esm/art%3A10.1186%2Fs13148-025-01907-y/MediaObjects/13148_2025_1907_MOESM2_ESM.xlsx
    sheet: B. raw data
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: D
      regex:
        - pattern: "_.*"
          replacement: ""
      remove:
        - "^LOC.*"
        - "^MIR.*"
      prioritize:
        - Gene
      taxon: 9606
    predicate: associated_with
    object:
      method: value
      encoding: GO:0071514
      prioritize:
        - BiologicalProcess

  provenance:
    repo: PMC
    publication: PMC12150451
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
