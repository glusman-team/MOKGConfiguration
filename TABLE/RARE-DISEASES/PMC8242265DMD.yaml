template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/mmc12.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8242265/
    sheet: Table S6
    row_slice:
      - 2
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prefix: "ENSEMBL:"
      prioritize:
        - Gene
    predicate: correlated_with
    object:
      method: value
      encoding: "MONDO:0010679"
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: "NCBITaxon:9606"

  provenance:
    repo: PMC
    publication: PMC8242265
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
    - annotation: Log2 FC
      method: column
      encoding: C
    - annotation: Adjusted P value
      method: column
      encoding: G
