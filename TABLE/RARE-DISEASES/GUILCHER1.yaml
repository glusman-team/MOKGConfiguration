template:
  syntax: TC3
  status: alpha
  
  source:
    kind: text
    local: ./DATALAKE/suppl_table_s1_patients_baseline.csv
    url: https://doi.org/10.1136/jpn-2022-000015
    row_slice: [1, auto]
    delimiter: ","
    
  statement:
    subject:
      method: column
      encoding: A
      prioritize: [IndividualOrganism, Human]
      regex:
        - pattern: ".*\\(.*\\).*"
          replacement: ""
    predicate: disease_has_basis_in
    object:
      method: column
      encoding: C
      prioritize: [Disease, PhenotypicFeature]
      
  provenance:
    repo: PMC
    publication: "12780483"
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: Extracted from supplementary table S1 of pediatric IBD CAM study

  annotations:
    - annotation: diagnosis_category
      method: column
      encoding: C
    - annotation: p_value
      method: column
      encoding: F
      fill: zero
    - annotation: sample_size_available
      method: value
      encoding: 111
    - annotation: sample_size_unavailable
      method: value
      encoding: 72