template:
  syntax: TC3
  status: alpha
  
  source:
    kind: text
    local: ./DATALAKE/suppl_table_s5_supplements.csv
    url: https://doi.org/10.1136/jpn-2022-000015
    row_slice: [1, auto]
    delimiter: ","
    
  statement:
    subject:
      method: column
      encoding: A
      prioritize: [IndividualOrganism, Human]
    predicate: associated_with
    object:
      method: column
      encoding: B
      prioritize: [Drug, ChemicalEntity, Food]
      regex:
        - pattern: "^.*,$"
          replacement: ""
        - pattern: ".*vitamin.*"
          replacement: "Vitamin "
        - pattern: ".*supplement.*"
          replacement: "Supplement "
      
  provenance:
    repo: PMC
    publication: "12780483"
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: Extracted from supplementary table S5 of pediatric IBD CAM study

  annotations:
    - annotation: product_category
      method: column
      encoding: A
    - annotation: current_usage_count
      method: column
      encoding: C
      fill: zero
    - annotation: previous_usage_count
      method: column
      encoding: D
      fill: zero
    - annotation: self_medication_count
      method: column
      encoding: E
      fill: zero
    - annotation: prescription_count
      method: column
      encoding: F
      fill: zero
    - annotation: usage_context_notes
      method: value
      encoding: "Currently and previously used by pediatric IBD patients in Swiss cohort"