template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/DNEU-86-0-s001.xlsx
    url: https://example.com/DNEU-86-0-s001.xlsx
    sheet: Mecp2.WT
    row_slice: [1, auto]

  statement:
    subject:
      method: column
      encoding: A
      prioritize: [BiologicalProcess]
    predicate: associated_with
    object:
      method: value
      encoding: Rett_syndrome_model
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: NCBITaxon:10090
      - qualifier: context_qualifier
        method: value
        encoding: untreated_Mecp2

  annotations:
    - annotation: p_value
      method: column
      encoding: B
    - annotation: adjusted_p_value
      method: column
      encoding: C
    - annotation: odds_ratio
      method: column
      encoding: F
    - annotation: combined_score
      method: column
      encoding: G

  provenance:
    repo: PMC
    publication: PMC13133546
    contributors:
      - kind: curation
        name: Tablassist
        date: 06 MAY 2026
        comment: Created for GO term enrichment analysis

sections:
