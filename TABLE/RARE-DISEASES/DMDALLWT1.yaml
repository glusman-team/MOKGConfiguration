template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/163442_0_supp_594814_qgmj1m.xlsx
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7710136/
    sheet: "Statistical Analysis"
    row_slice:
      - 1
      - auto

  statement:
    subject:
      method: column
      encoding: A
      prioritize:
        - Gene
      taxon: 10090
    predicate: correlated_with
    object:
      method: value
      encoding: "MONDO:0010679"
      prioritize:
        - Disease
    qualifiers:
      - qualifier: species_context_qualifier
        method: value
        encoding: "NCBITaxon:10090"

  provenance:
    repo: PMC
    publication: PMC7710136
    contributors:
      - kind: curation
        name: Tablassist Pioneer
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
        comment: "Subject uses Gene Symbol (col A) from Statistical Analysis sheet; mouse Gene Symbols (e.g. Utrn, Dmd) did not resolve via search-gene-curies with taxon 10090. For reliable entity resolution, DMDMGI1.yaml uses MGI-accession extraction from the Protein Data Description column. DMDALLWT1.yaml captures the fold-change statistics as annotations; the Gene Symbol values are provided as-is and may require downstream resolution."

  annotations:
    - annotation: allDystrophicVsAllWT_Log2Ratio
      method: column
      encoding: AV
    - annotation: allDystrophicVsAllWT_negLogP
      method: column
      encoding: AW
