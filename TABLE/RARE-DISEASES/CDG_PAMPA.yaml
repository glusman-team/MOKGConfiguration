template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/IUB-78-0-s002.xlsx
    url: https://journals.iucr.org/iucr/publications/iub/iub78/iub78-supplementary/IUB-78-0-s002.xlsx
    sheet: "PAMPA assay"
    row_slice: [1, auto]  # Skip header row

  statement:
    subject:
      method: column
      encoding: "__UNNAMED__0"  # Compound names column
      prioritize: [ChemicalEntity]
    predicate: associated_with
    object:
      method: column
      encoding: "__UNNAMED__13"  # Pe values column
      prioritize: [QuantityValue]

  provenance:
    repo: PMC
    publication: "13071126"
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: PAMPA permeability assay data for compound screening

  annotations:
    - annotation: assay_type
      method: value
      encoding: "PAMPA (Parallel Artificial Membrane Permeability Assay)"
    
    - annotation: measurement_parameter
      method: value
      encoding: "Pe (effective permeability)"
    
    - annotation: experimental_conditions
      method: value
      encoding: "37°C, 50 rpm, 16 hours"
