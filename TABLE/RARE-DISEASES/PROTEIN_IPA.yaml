template:
  syntax: TC3
  status: alpha

  source:
    kind: text
    local: ./DATALAKE/43856_2026_1489_MOESM7_ESM.csv
    url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC13125234/
    row_slice: [1, "auto"]
    delimiter: ","

  statement:
    subject:
      method: column
      encoding: E
      taxon: 9606
      prioritize: [Gene]
      explode_by: ","
    predicate: participates_in
    object:
      method: column
      encoding: A
      prioritize: [Pathway]

  provenance:
    repo: PMC
    publication: PMC13125234
    contributors:
      - kind: curation
        name: Tablassist Discovery Pipeline
        date: 06 MAY 2026
        comment: IPA pathway enrichment from protein DEGs in KD vs MIS-C comparison
      - kind: tool
        name: tablassist
        date: 06 MAY 2026

  annotations:
    - annotation: neg_log10_p_value
      method: column
      encoding: B
    - annotation: z_score
      method: column
      encoding: D
