template:
  syntax: TC3
  status: alpha
  
  source:
    kind: text
    local: ./source/PMC13134318.1/supplement_table_S3.csv
    url: https://static-content.springer.com/esm/art%3A10.1186%2Fs13023-026-04327-0/MediaObjects/13023_2026_4327_MOESM1_ESM.pdf
    delimiter: "\t"
    row_slice: [1, auto]
  
  statement:
    subject:
      method: column
      encoding: A
    predicate: manifestation_of
    object:
      method: column
      encoding: B
      prioritize: [DiseaseOrPhenotypicFeature]
  
  provenance:
    repo: PMC
    publication: PMC13134318
    contributors:
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
        comment: Config for pulmonary hemorrhage patients table S3
  
  annotations:
    - annotation: patient_id
      method: column
      encoding: A
      fill: forward
    - annotation: age
      method: column
      encoding: B
    - annotation: gender
      method: column
      encoding: C
      regex:
        - pattern: "M"
          replacement: "male"
        - pattern: "F"
          replacement: "female"
    - annotation: respiratory_manifestation
      method: column
      encoding: D
    - annotation: chest_pain
      method: column
      encoding: E
      regex:
        - pattern: "\\+"
          replacement: "present"
        - pattern: "-"
          replacement: "absent"
    - annotation: pneumothorax
      method: column
      encoding: F
      regex:
        - pattern: "\\+"
          replacement: "present"
        - pattern: "-"
          replacement: "absent"
    - annotation: diagnostic_duration_years
      method: column
      encoding: M
    - annotation: family_history
      method: column
      encoding: N
      regex:
        - pattern: "\\+"
          replacement: "positive"
        - pattern: "-"
          replacement: "negative"

sections:
  - statement:
      predicate: associated_with
      object:
        method: column
        encoding: G
        prioritize: [ClinicalFinding]
  - statement:
      predicate: manifestation_of
      object:
        method: column
        encoding: H
        prioritize: [PhenotypicFeature]