template:
  syntax: TC3
  status: alpha

  source:
    kind: excel
    local: ./DATALAKE/13148_2026_2065_MOESM5_ESM.xlsx
    url: https://static-content.springer.com/esm/art%3A10.1186%2Fs13148-026-02065-5/MediaObjects/13148_2026_2065_MOESM5_ESM.xlsx
    sheet: Sheet1
    row_slice:
      - 2
      - auto
    reindex:
      - column: A
        comparator: "Chr11"
      - column: A
        comparator: "Chr14"
      - column: A
        comparator: "Chr15"
      - column: A
        comparator: "Chr20"

  statement:
    subject:
      method: column
      encoding: A
      taxon: 9606
      prioritize:
        - Gene
      remove:
        - "^\\s+"
        - "\\s+$"
        - "^LOC.*"
        - "^MIR.*"
      regex:
        - pattern: ":.*"
          replacement: ""
    predicate: associated_with
    object:
      method: value
      encoding: GO:0071514
      prioritize:
        - BiologicalProcess

  provenance:
    repo: PMC
    publication: PMC12958509
    contributors:
      - kind: curation
        name: Skye Lane Goetz
        date: 06 MAY 2026
        organizations:
          - Institute for Systems Biology
      - kind: tool
        name: tablassist
        date: 06 MAY 2026
